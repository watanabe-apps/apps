<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>マッチングアプリ</title>
  <style>
    /* ==========================================
       共通設定: 確実な画面高さの取得と誤操作防止
       ========================================== */
    :root {
      --vh: 1vh;
    }
    * {
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
      /* ネイティブのドラッグプレビュー（残像）を無効化 */
      -webkit-user-drag: none;
      user-drag: none;
    }
    html, body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh; /* フォールバック */
      height: 100dvh; /* 最新iOS用フォールバック */
      height: calc(var(--vh, 1vh) * 100);
      overflow: hidden; /* 全体のバウンススクロール防止 */
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: #f2f2f7;
      color: #333;
    }

    /* 画面切り替え用 */
    .view-container {
      display: none;
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
      flex-direction: column;
      z-index: 1;
    }
    .view-container.active { 
      display: flex; 
      z-index: 10;
    }

    /* ==========================================
       Home View
       ========================================== */
    #home-view {
      justify-content: center;
      align-items: center;
      gap: 40px;
    }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 2rem;
      padding: 20px 40px;
      border-radius: 15px;
      background-color: #fff;
      border: 3px solid #007aff;
      color: #007aff;
      cursor: pointer;
      touch-action: manipulation;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      transition: transform 0.1s;
    }
    .btn:active { 
      transform: scale(0.95); 
    }
    .hint-text {
      font-size: 1rem;
      color: #999;
      text-align: center;
      margin-top: 5px;
    }

    /* ==========================================
       Setting View
       ========================================== */
    #setting-view {
      background: #f2f2f7;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: calc(80px + env(safe-area-inset-bottom));
    }
    .setting-form {
      background: #fff;
      margin: 20px;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }
    .setting-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
      border-bottom: 1px solid #eee;
      font-size: 1.5rem;
    }
    .stepper { display: flex; align-items: center; gap: 20px; }
    .stepper-btn {
      width: 40px; height: 40px;
      font-size: 1.5rem;
      border-radius: 5px;
      border: none;
      background: #eee;
      color: #007aff;
      cursor: pointer;
      touch-action: manipulation;
    }
    .stepper-btn:active { background: #ddd; }
    .close-btn {
      margin: 20px auto;
      display: block;
      color: #fff;
      font-size: 1.5rem;
      background: #007aff;
      padding: 15px 40px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      touch-action: manipulation;
    }
    .close-btn:active { transform: scale(0.95); }

    /* ==========================================
       Playing View
       ========================================== */
    #playing-view {
      background: #fff;
      touch-action: none; /* プレイ領域の誤スワイプ防止 */
    }
    .score-header {
      text-align: right;
      padding: 20px;
      font-size: 1.5rem;
      font-weight: bold;
    }
    
    .grids-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      padding: 0 20px;
      height: 50%;
    }
    
    .grid-container {
      display: grid;
      gap: 0px;
      padding: 10px;
      transition: transform 1.5s ease-in-out, opacity 1.5s ease;
    }
    #correct-grid { background-color: rgba(255, 255, 0, 0.4); border-radius: 10px; }
    #answer-grid  { background-color: rgba(0, 128, 0, 0.3); border-radius: 10px; }
    
    .cell {
      border: 5px solid #333;
      background-color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }
    .cell.highlight {
      background-color: rgba(0, 128, 255, 0.2) !important;
      border-color: #007aff;
    }
    
    /* 💡 発想の転換：テキスト(innerText)ではなく、CSSの疑似要素を使って描画 
       これによりOSが「ドラッグ可能なテキスト」と認識できなくなり、残像が消えます 
    */
    .cell::after {
      content: attr(data-emoji);
      pointer-events: none;
    }

    /* 正誤マーク（赤丸・青バツ） */
    .mark {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      z-index: 5;
    }

    /* ドラッグ可能アイテム */
    .draggable-item {
      position: absolute;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: grab;
      z-index: 10;
      transition: transform 0.1s, filter 0.1s;
      
      /* カード形式（背景や枠）を解除し、元の影のみの表示に戻す */
      background-color: transparent;
      border: none;
      border-radius: 0;
      box-shadow: none;
      filter: drop-shadow(0px 4px 4px rgba(0,0,0,0.2));
      
      touch-action: none; 
      -webkit-user-select: none;
      user-select: none;
      -webkit-user-drag: none;
      user-drag: none;
    }
    
    /* こちらもテキストではなく疑似要素で描画 */
    .draggable-item::after {
      content: attr(data-emoji);
      pointer-events: none;
    }
    
    .draggable-item.dragging {
      cursor: grabbing;
      transition: none;
      z-index: 100;
      transform: translate(-50%, -50%) scale(1.15) !important;
      /* 持ち上げた感の強調 */
      filter: drop-shadow(0px 8px 8px rgba(0,0,0,0.3));
    }
  </style>
</head>
<body>

  <!-- Home View -->
  <div id="home-view" class="view-container active">
    <button class="btn" onclick="startApp()">
      スタート <span>▶️</span>
    </button>
    
    <div style="display:flex; flex-direction:column; align-items:center">
      <button class="btn" onclick="handleSettingTap()" style="color:#555; border-color:#555; background:transparent;">
        設定 <span>⚙️</span>
      </button>
      <div class="hint-text">トリプルタップ</div>
    </div>
  </div>

  <!-- Setting View -->
  <div id="setting-view" class="view-container">
    <div class="setting-form">
      <div class="setting-row">
        <span>問題数</span>
        <div class="stepper">
          <button class="stepper-btn" onclick="changeSetting('questions', -1)">-</button>
          <span id="val-questions" style="min-width:30px;text-align:center;">10</span>
          <button class="stepper-btn" onclick="changeSetting('questions', 1)">+</button>
        </div>
      </div>
      <div class="setting-row">
        <span>縦 (行)</span>
        <div class="stepper">
          <button class="stepper-btn" onclick="changeSetting('rows', -1)">-</button>
          <span id="val-rows" style="min-width:30px;text-align:center;">2</span>
          <button class="stepper-btn" onclick="changeSetting('rows', 1)">+</button>
        </div>
      </div>
      <div class="setting-row">
        <span>横 (列)</span>
        <div class="stepper">
          <button class="stepper-btn" onclick="changeSetting('columns', -1)">-</button>
          <span id="val-columns" style="min-width:30px;text-align:center;">2</span>
          <button class="stepper-btn" onclick="changeSetting('columns', 1)">+</button>
        </div>
      </div>
    </div>
    <button class="close-btn" onclick="switchView('home')">閉じる</button>
  </div>

  <!-- Playing View -->
  <div id="playing-view" class="view-container">
    <div class="score-header" id="score-text">◯:0 ×:0</div>
    
    <div class="grids-wrapper" id="grids-wrapper">
      <div id="correct-grid" class="grid-container"></div>
      <div style="width: 2px; height: 100%; background: #ccc;"></div>
      <div id="answer-grid" class="grid-container"></div>
    </div>

    <!-- ドラッグアイテム描画用コンテナ -->
    <div id="draggables-container" style="position: absolute; top:0; left:0; width:100%; height:100%; pointer-events:none;"></div>
  </div>

  <script>
    // ==========================================
    // グローバル状態管理
    // ==========================================
    let state = {
      isPlaying: false,
      corrects: 0,
      wrongs: 0,
      isAnswerChecked: false,
      draggables: [],
      answerCells: [],
      correctCells: []
    };

    // ==========================================
    // 1. 確実な画面高さの取得
    // ==========================================
    const setVh = () => {
      let h = window.innerHeight;
      if (h === 0) h = window.screen.availHeight;
      let vh = h * 0.01;
      document.documentElement.style.setProperty('--vh', `${vh}px`);
      if (state && state.isPlaying) updateGridSizes();
    };
    setVh();
    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(setVh, 200);
    });
    window.addEventListener('orientationchange', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(setVh, 200);
    });

    // ==========================================
    // 2. LocalStorage と 設定管理
    // ==========================================
    const defaultSettings = { questions: 10, rows: 2, columns: 2 };
    let settings = { ...defaultSettings };

    const safeStorage = {
      get: (key) => { try { return window.localStorage.getItem(key); } catch (e) { return null; } },
      set: (key, val) => { try { window.localStorage.setItem(key, val); } catch (e) {} }
    };

    const saved = safeStorage.get('matchSettings');
    if (saved) {
      try {
        let parsed = JSON.parse(saved);
        if (parsed && typeof parsed.questions === 'number') settings = parsed;
      } catch (e) {}
    }

    function saveSettingsUI() {
      document.getElementById('val-questions').innerText = settings.questions;
      document.getElementById('val-rows').innerText = settings.rows;
      document.getElementById('val-columns').innerText = settings.columns;
    }
    
    function saveSettings() {
      safeStorage.set('matchSettings', JSON.stringify(settings));
      saveSettingsUI();
    }
    
    window.addEventListener('DOMContentLoaded', saveSettingsUI);

    function changeSetting(key, diff) {
      initAudio();
      let val = settings[key] + diff;
      if (key === 'questions' && (val < 1 || val > 20)) return;
      // 4*4まで選べるように修正
      if ((key === 'rows' || key === 'columns') && (val < 1 || val > 4)) return;
      settings[key] = val;
      saveSettings();
    }

    // ==========================================
    // 3. Web Audio API 効果音
    // ==========================================
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;

    function initAudio() {
      try {
        if (!audioCtx) audioCtx = new AudioContext();
        if (audioCtx.state === 'suspended') audioCtx.resume();
      } catch (e) {}
    }

    function playSound(type) {
      if (!audioCtx) return;
      try {
        const t = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        if (type === 'pinpon') {
          osc.type = 'sine';
          osc.frequency.setValueAtTime(660, t);
          osc.frequency.setValueAtTime(880, t + 0.1);
          gain.gain.setValueAtTime(0.5, t);
          gain.gain.exponentialRampToValueAtTime(0.01, t + 0.4);
          osc.start(t); osc.stop(t + 0.4);
        } else if (type === 'bubu') {
          osc.type = 'square';
          osc.frequency.setValueAtTime(150, t);
          gain.gain.setValueAtTime(0.3, t);
          gain.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
          osc.start(t); osc.stop(t + 0.3);
        } else if (type === 'pinpon3') {
          for(let i=0; i<3; i++) {
            let o = audioCtx.createOscillator();
            let g = audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination);
            o.type = 'sine';
            o.frequency.setValueAtTime(660, t + i*0.2);
            o.frequency.setValueAtTime(880, t + i*0.2 + 0.05);
            g.gain.setValueAtTime(0.5, t + i*0.2);
            g.gain.exponentialRampToValueAtTime(0.01, t + i*0.2 + 0.15);
            o.start(t + i*0.2); o.stop(t + i*0.2 + 0.2);
          }
        }
      } catch (e) {}
    }

    // ==========================================
    // 4. View / トリプルタップ制御
    // ==========================================
    function switchView(viewName) {
      initAudio();
      document.getElementById('home-view').classList.remove('active');
      document.getElementById('setting-view').classList.remove('active');
      document.getElementById('playing-view').classList.remove('active');
      document.getElementById(viewName + '-view').classList.add('active');
    }

    let tapCount = 0;
    let tapTimer;
    function handleSettingTap() {
      initAudio();
      tapCount++;
      if (tapCount === 1) {
        tapTimer = setTimeout(() => { tapCount = 0; }, 600);
      } else if (tapCount >= 3) {
        clearTimeout(tapTimer);
        tapCount = 0;
        switchView('setting');
      }
    }

    function startApp() {
      initAudio();
      switchView('playing');
      startGame();
    }

    // ==========================================
    // 5. ゲームロジック
    // ==========================================
    const imageLibrary = [
      "🍎", "🍌", "🍇", "🍓", "🍉", 
      "🐶", "🐱", "🐰", "🐘", "🦒", 
      "🚗", "🚓", "🚒", "✈️", "🚀", 
      "🌳", "🌻", "😊", "⭐", "🎈", 
      "🎁", "🥁", "🎸", "⚽", "🧸"
    ];

    function updateScore() {
      document.getElementById('score-text').innerText = `◯:${state.corrects} ×:${state.wrongs}`;
    }

    function shuffleArray(array) {
      let curId = array.length;
      while (0 !== curId) {
        let randId = Math.floor(Math.random() * curId);
        curId -= 1;
        let tmp = array[curId];
        array[curId] = array[randId];
        array[randId] = tmp;
      }
      return array;
    }

    function startGame() {
      state.isPlaying = true;
      state.corrects = 0;
      state.wrongs = 0;
      updateScore();
      setQuestion();
    }

    function setQuestion() {
      state.isAnswerChecked = false;
      const count = settings.rows * settings.columns;
      
      let shuffled = shuffleArray([...imageLibrary]).slice(0, count);
      
      state.correctCells = shuffled.map(img => ({ image: img }));
      state.answerCells = Array(count).fill(null).map(() => ({ image: null, el: null, isCorrect: null }));
      
      let draggablesImages = shuffleArray([...shuffled]);
      state.draggables = draggablesImages.map((img, i) => ({ image: img, id: i }));

      renderGrids();
      renderDraggables();
      updateGridSizes();
    }

    function renderGrids() {
      const correctGrid = document.getElementById('correct-grid');
      const answerGrid = document.getElementById('answer-grid');
      
      const gridStyle = `grid-template-columns: repeat(${settings.columns}, 1fr); grid-template-rows: repeat(${settings.rows}, 1fr);`;
      correctGrid.style = gridStyle;
      answerGrid.style = gridStyle;
      
      answerGrid.style.transform = `translateX(0)`;
      answerGrid.style.opacity = '1.0';

      correctGrid.innerHTML = '';
      answerGrid.innerHTML = '';

      state.correctCells.forEach(cell => {
        const div = document.createElement('div');
        div.className = 'cell';
        div.dataset.emoji = cell.image; // テキストではなく属性にセット
        correctGrid.appendChild(div);
      });

      state.answerCells.forEach((cell, i) => {
        const div = document.createElement('div');
        div.className = 'cell';
        div.dataset.index = i;
        answerGrid.appendChild(div);
        cell.el = div;
      });
    }

    function updateGridSizes() {
      const wrapper = document.getElementById('grids-wrapper');
      if(!wrapper) return;
      const rect = wrapper.getBoundingClientRect();
      const maxW = (rect.width - 40) / (settings.columns * 2);
      const maxH = (rect.height) / settings.rows;
      const size = Math.min(200, maxW, maxH);
      
      const cells = document.querySelectorAll('.cell');
      cells.forEach(c => {
        c.style.width = `${size}px`;
        c.style.height = `${size}px`;
        c.style.fontSize = `${size * 0.6}px`; 
      });

      state.draggables.forEach((d, i) => {
        if (!d.placed && d.el) {
          const spacing = window.innerWidth / (state.draggables.length + 1);
          d.el.style.fontSize = `${size * 0.6}px`;
          // 当たり判定として明示的な幅・高さを設定（枠線や背景は透明なので表示はされない）
          d.el.style.width = `${size * 0.8}px`;
          d.el.style.height = `${size * 0.8}px`;
          d.el.style.left = `${spacing * (i + 1)}px`;
          d.el.style.top = `${window.innerHeight - 100}px`;
          d.el.style.transform = `translate(-50%, -50%)`;
        }
      });
    }

    function renderDraggables() {
      const container = document.getElementById('draggables-container');
      container.innerHTML = '';
      
      state.draggables.forEach((item, index) => {
        const el = document.createElement('div');
        el.className = 'draggable-item';
        el.dataset.emoji = item.image; // テキストではなく属性にセット
        el.style.pointerEvents = 'auto';

        // ==========================================
        // ★ゴースト・長押し選択防止の最重要ポイント
        // ==========================================
        el.ondragstart = () => false;
        el.addEventListener('dragstart', (e) => e.preventDefault());
        el.addEventListener('contextmenu', (e) => e.preventDefault());
        
        container.appendChild(el);
        item.el = el;
        item.placed = false;
        item.placedIndex = -1;

        let isDragging = false;
        let activeX = 0, activeY = 0;

        el.addEventListener('pointerdown', (e) => {
          e.preventDefault();
          if (state.isAnswerChecked) return;
          isDragging = true;
          el.setPointerCapture(e.pointerId);
          el.classList.add('dragging');
          
          if (item.placed) {
            state.answerCells[item.placedIndex].image = null;
            item.placed = false;
            item.placedIndex = -1;
          }
        });

        el.addEventListener('pointermove', (e) => {
          if (!isDragging) return;
          activeX = e.clientX;
          activeY = e.clientY;
          el.style.left = `${activeX}px`;
          el.style.top = `${activeY}px`;

          state.answerCells.forEach(cell => {
            const rect = cell.el.getBoundingClientRect();
            if (activeX > rect.left && activeX < rect.right &&
                activeY > rect.top && activeY < rect.bottom && !cell.image) {
              cell.el.classList.add('highlight');
            } else {
              cell.el.classList.remove('highlight');
            }
          });
        });

        el.addEventListener('pointerup', (e) => {
          if (!isDragging) return;
          isDragging = false;
          el.releasePointerCapture(e.pointerId);
          el.classList.remove('dragging');

          let snapped = false;
          state.answerCells.forEach((cell, i) => {
            cell.el.classList.remove('highlight');
            const rect = cell.el.getBoundingClientRect();
            
            if (activeX > rect.left && activeX < rect.right &&
                activeY > rect.top && activeY < rect.bottom && !cell.image) {
              el.style.left = `${rect.left + rect.width/2}px`;
              el.style.top = `${rect.top + rect.height/2}px`;
              cell.image = item.image;
              item.placed = true;
              item.placedIndex = i;
              snapped = true;
            }
          });

          if (!snapped) {
            const spacing = window.innerWidth / (state.draggables.length + 1);
            el.style.left = `${spacing * (index + 1)}px`;
            el.style.top = `${window.innerHeight - 100}px`;
          }

          checkAnswerTrigger();
        });
      });
    }

    function checkAnswerTrigger() {
      const isNamedAll = state.answerCells.every(c => c.image !== null);
      if (isNamedAll) {
        state.isAnswerChecked = true;
        executeAnswerCheck();
      }
    }

    const sleep = ms => new Promise(r => setTimeout(r, ms));

    async function executeAnswerCheck() {
      const correctGrid = document.getElementById('correct-grid');
      const answerGrid = document.getElementById('answer-grid');
      
      const cRect = correctGrid.getBoundingClientRect();
      const aRect = answerGrid.getBoundingClientRect();
      const offset = cRect.left - aRect.left;
      
      answerGrid.style.transform = `translateX(${offset}px)`;
      answerGrid.style.opacity = '0.5';
      
      state.draggables.forEach(d => {
         // アイテム自体も透過するアニメーションを追加
         d.el.style.transition = 'transform 1.5s ease-in-out, opacity 1.5s ease-in-out';
         d.el.style.transform = `translate(calc(-50% + ${offset}px), -50%)`;
         d.el.style.opacity = '0.5';
      });

      await sleep(1500);

      let isCorrectAll = true;

      for (let i = 0; i < state.answerCells.length; i++) {
        await sleep(400);
        const cell = state.answerCells[i];
        const isMatch = cell.image === state.correctCells[i].image;
        
        const svg = document.createElement('div');
        svg.className = 'mark';
        if (isMatch) {
          playSound('pinpon');
          svg.innerHTML = `<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" stroke="red" stroke-width="10" fill="none"/></svg>`;
        } else {
          playSound('bubu');
          isCorrectAll = false;
          cell.isCorrect = false;
          svg.innerHTML = `<svg viewBox="0 0 100 100"><path d="M20,20 L80,80 M80,20 L20,80" stroke="blue" stroke-width="10" stroke-linecap="round" fill="none"/></svg>`;
        }
        cell.el.appendChild(svg);
      }

      await sleep(1000);

      if (isCorrectAll) {
        playSound('pinpon3');
        state.corrects++;
        updateScore();
        
        if (state.corrects >= settings.questions) {
          await sleep(2000);
          state.isPlaying = false;
          switchView('home');
        } else {
          setQuestion();
        }
      } else {
        playSound('bubu');
        state.wrongs++;
        updateScore();
        
        state.draggables.forEach(d => {
          if (state.answerCells[d.placedIndex]?.isCorrect === false) {
             state.answerCells[d.placedIndex].image = null;
             state.answerCells[d.placedIndex].isCorrect = null;
             d.placed = false;
             d.placedIndex = -1;
          }
        });

        answerGrid.style.transform = `translateX(0)`;
        answerGrid.style.opacity = '1.0';
        state.answerCells.forEach(c => {
           // 不正解のマークだけ消す
           const mark = c.el.querySelector('.mark');
           if(mark) mark.remove();
        });
        
        state.draggables.forEach((d, index) => {
          // グリッド(1.5s ease-in-out)とタイミング・イージングを完全に一致させる
          d.el.style.transition = 'transform 1.5s ease-in-out, left 1.5s ease-in-out, top 1.5s ease-in-out, opacity 1.5s ease-in-out';
          d.el.style.opacity = '1.0';
          if (!d.placed) {
            const spacing = window.innerWidth / (state.draggables.length + 1);
            d.el.style.left = `${spacing * (index + 1)}px`;
            d.el.style.top = `${window.innerHeight - 100}px`;
          }
          d.el.style.transform = `translate(-50%, -50%)`;
          
          setTimeout(() => { d.el.style.transition = 'transform 0.1s, filter 0.1s'; }, 1500);
        });

        await sleep(1500);
        state.isAnswerChecked = false;
      }
    }
  </script>
</body>
</html>
