<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>数字ならべ</title>
<!-- Klee Oneをフォールバックとして導入 -->
<link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@600&display=swap" rel="stylesheet">
<style>
    /* 共通要件: 確実な画面高さの取得とスクロール制御 */
    :root {
        --vh: 1vh;
        --primary-color: #007AFF;
        --bg-color: #ffffff;
        --side-padding: 24px; /* 左右の余白を少し広めに確保 */
    }

    body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: calc(var(--vh, 1vh) * 100);
        overflow: hidden;
        /* UDデジタル教科書体を最優先、次にKlee Oneを指定 */
        font-family: "UD Digi Kyokasho NK-R", "UD Digi Kyokasho NP-R", "UD Digital Kyokasho NK-R", "UD Digital Kyokasho NP-R", "UD Digi Kyokasho", "Klee One", -apple-system, BlinkMacSystemFont, sans-serif;
        background-color: var(--bg-color);
        user-select: none;
        -webkit-user-select: none;
    }

    /* 画面コンテナ */
    .screen {
        display: none;
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
        flex-direction: column;
    }
    .screen.active {
        display: flex;
    }

    /* ボタン共通スタイル */
    .btn {
        background-color: var(--primary-color);
        color: white;
        border: none;
        border-radius: 10px;
        padding: 15px 30px;
        font-size: 24px;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        touch-action: manipulation;
        font-family: inherit;
    }
    .btn:active {
        transform: scale(0.95);
    }

    /* ホーム画面 */
    #home-screen {
        justify-content: center;
        align-items: center;
        gap: 40px;
    }
    #home-screen .btn {
        width: 200px;
        text-align: center;
    }

    /* 設定画面 */
    #setting-screen {
        background-color: var(--bg-color);
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        padding-bottom: env(safe-area-inset-bottom);
    }
    .setting-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 15px 20px;
        background-color: white;
        border-bottom: 1px solid #ccc;
        position: sticky;
        top: 0;
        z-index: 10;
    }
    .setting-header h1 {
        margin: 0;
        font-size: 20px;
    }
    .setting-group {
        background-color: white;
        margin: 20px;
        border-radius: 10px;
        overflow: hidden;
    }
    .setting-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 20px;
        border-bottom: 1px solid #eee;
        font-size: 18px;
    }
    .setting-item:last-child {
        border-bottom: none;
    }
    .setting-item label {
        flex: 1;
    }
    .setting-item input[type="number"], .setting-item select {
        font-size: 18px;
        padding: 5px;
        width: 80px;
        text-align: right;
        font-family: inherit;
    }
    .setting-item input[type="checkbox"] {
        width: 24px;
        height: 24px;
    }

    /* プレイ画面 */
    #play-screen {
        touch-action: none; 
        position: relative;
    }

    .question-label {
        position: absolute;
        top: 10px;
        right: var(--side-padding);
        font-size: 24px;
        font-weight: bold;
        color: #333;
        z-index: 5;
    }
    .back-btn {
        position: absolute;
        top: 10px;
        left: var(--side-padding);
        padding: 8px 15px;
        font-size: 16px;
        background-color: #FF3B30;
        z-index: 5;
    }

    /* 正解時のマル表示 */
    #correct-mark {
        position: absolute;
        top: 40%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0);
        font-size: clamp(150px, 40vw, 300px);
        color: #FF3B30;
        font-weight: bold;
        z-index: 100;
        pointer-events: none;
        opacity: 0;
        transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s ease;
    }
    #correct-mark.show {
        transform: translate(-50%, -50%) scale(1);
        opacity: 0.8;
    }

    /* グリッド領域 */
    #grid-container {
        width: 100%;
        display: flex;
        flex-wrap: wrap;
        margin-top: 60px; 
        padding: 0 var(--side-padding);
        box-sizing: border-box;
    }
    .grid-cell {
        box-sizing: border-box;
        border: 1px solid #333;
        background-color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        font-weight: bold;
        color: #000;
    }
    .grid-cell.target {
        background-color: transparent;
    }
    .grid-cell.out-of-range {
        background-color: #e0e0e0;
        color: #888;
    }

    /* 初期配置領域（画面下部） */
    #tray-container {
        flex: 1;
        position: relative;
        width: 100%;
        margin-top: 20px;
        padding: 0 var(--side-padding);
        box-sizing: border-box;
        /* 下部のセーフエリアとボタンを考慮した余白 */
        margin-bottom: calc(60px + env(safe-area-inset-bottom));
    }

    /* ドラッグする数字ブロック */
    .number-block {
        position: absolute;
        box-sizing: border-box;
        border: 2px solid #000;
        background-color: #FFD700;
        display: flex;
        justify-content: center;
        align-items: center;
        font-weight: bold;
        color: #000;
        border-radius: 4px;
        cursor: grab;
        touch-action: none;
        transition: background-color 0.3s;
        line-height: 1;
    }
    .number-block.correct {
        background-color: #32CD32;
    }
    .number-block.dragging {
        transition: none;
        opacity: 0.9;
        transform: scale(1.05);
    }
    .number-block.animating {
        transition: left 0.3s ease, top 0.3s ease, background-color 0.3s ease;
    }

    /* オーバーレイUI */
    #overlay-ui {
        display: none;
        position: absolute;
        bottom: calc(20px + env(safe-area-inset-bottom));
        left: 50%;
        transform: translateX(-50%);
        z-index: 1000;
    }

</style>
</head>
<body>

    <!-- ホーム画面 -->
    <div id="home-screen" class="screen active">
        <button class="btn" onclick="startGame()">スタート</button>
        <button class="btn" style="background-color: #8E8E93;" onclick="showScreen('setting-screen')">設定</button>
    </div>

    <!-- 設定画面 -->
    <div id="setting-screen" class="screen">
        <div class="setting-header">
            <button class="btn" style="padding: 5px 15px; font-size: 16px;" onclick="showScreen('home-screen')">もどる</button>
            <h1>設定</h1>
            <div style="width: 60px;"></div>
        </div>
        
        <div class="setting-group">
            <div class="setting-item">
                <label>最小値:</label>
                <input type="number" id="set-min" min="1" max="99">
            </div>
            <div class="setting-item">
                <label>最大値:</label>
                <input type="number" id="set-max" min="2" max="100">
            </div>
        </div>

        <div class="setting-group">
            <div class="setting-item">
                <label>モード:</label>
                <select id="set-mode">
                    <option value="all">全部</option>
                    <option value="partial">一部空き</option>
                </select>
            </div>
            <div class="setting-item" id="interval-setting" style="display: none;">
                <label>間隔 (一部空き用):</label>
                <input type="number" id="set-interval" min="2" max="10">
            </div>
        </div>

        <div class="setting-group">
            <div class="setting-item">
                <label>問題数:</label>
                <input type="number" id="set-max-questions" min="1" max="20">
            </div>
            <div class="setting-item">
                <label>もどるボタンの表示:</label>
                <input type="checkbox" id="set-show-back">
            </div>
        </div>
    </div>

    <!-- プレイ画面 -->
    <div id="play-screen" class="screen">
        <button class="btn back-btn" id="play-back-btn" onclick="quitGame()">もどる</button>
        <div id="question-label" class="question-label">1/5</div>
        
        <div id="grid-container"></div>
        <div id="tray-container"></div>
        
        <div id="correct-mark">○</div>
        
        <div id="overlay-ui">
            <button class="btn" id="next-btn" onclick="nextQuestion()">つぎへ</button>
        </div>
    </div>

<script>
    // --- 1. 共通要件: 画面高さの確実な取得 ---
    function setHeight() {
        let vh = window.innerHeight * 0.01;
        document.documentElement.style.setProperty('--vh', `${vh}px`);
    }
    setHeight();
    window.addEventListener('resize', setHeight);
    window.addEventListener('orientationchange', () => { setTimeout(setHeight, 100); });

    // --- 2. 設定の管理 ---
    const settings = {
        min: parseInt(localStorage.getItem('num-min')) || 1,
        max: parseInt(localStorage.getItem('num-max')) || 10,
        mode: localStorage.getItem('num-mode') || 'all',
        interval: parseInt(localStorage.getItem('num-interval')) || 3,
        maxQuestions: parseInt(localStorage.getItem('num-maxQuestions')) || 5,
        showBackButton: localStorage.getItem('num-showBackButton') !== 'false'
    };

    function initSettingsUI() {
        document.getElementById('set-min').value = settings.min;
        document.getElementById('set-max').value = settings.max;
        document.getElementById('set-mode').value = settings.mode;
        document.getElementById('set-interval').value = settings.interval;
        document.getElementById('set-max-questions').value = settings.maxQuestions;
        document.getElementById('set-show-back').checked = settings.showBackButton;
        toggleIntervalSetting();
    }

    function toggleIntervalSetting() {
        const mode = document.getElementById('set-mode').value;
        document.getElementById('interval-setting').style.display = mode === 'partial' ? 'flex' : 'none';
    }
    document.getElementById('set-mode').addEventListener('change', toggleIntervalSetting);

    function saveSettings() {
        settings.min = parseInt(document.getElementById('set-min').value);
        settings.max = parseInt(document.getElementById('set-max').value);
        settings.mode = document.getElementById('set-mode').value;
        settings.interval = parseInt(document.getElementById('set-interval').value);
        settings.maxQuestions = parseInt(document.getElementById('set-max-questions').value);
        settings.showBackButton = document.getElementById('set-show-back').checked;

        if(settings.min >= settings.max) {
            settings.max = settings.min + 1;
            document.getElementById('set-max').value = settings.max;
        }

        localStorage.setItem('num-min', settings.min);
        localStorage.setItem('num-max', settings.max);
        localStorage.setItem('num-mode', settings.mode);
        localStorage.setItem('num-interval', settings.interval);
        localStorage.setItem('num-maxQuestions', settings.maxQuestions);
        localStorage.setItem('num-showBackButton', settings.showBackButton);
    }
    document.querySelectorAll('#setting-screen input, #setting-screen select').forEach(el => {
        el.addEventListener('change', saveSettings);
    });

    let audioCtx = null;
    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
        if (screenId === 'setting-screen') {
            initSettingsUI();
        }
    }

    // --- 4. ゲームロジック ---
    let currentQuestion = 1;
    let panels = []; 
    let blocks = []; 
    let cellSize = 0;
    let zIndexCounter = 10;
    const SIDE_PADDING = 24; 

    function startGame() {
        initAudio();
        currentQuestion = 1;
        saveSettings();
        showScreen('play-screen');
        prepareQuestion();
    }

    function quitGame() {
        clearBlocks();
        showScreen('home-screen');
    }

    function prepareQuestion() {
        clearBlocks(); 
        document.getElementById('question-label').innerText = `${currentQuestion}/${settings.maxQuestions}`;
        document.getElementById('play-back-btn').style.display = settings.showBackButton ? 'block' : 'none';
        document.getElementById('correct-mark').classList.remove('show');
        document.getElementById('overlay-ui').style.display = 'none';
        
        // --- 画面に収めるためのサイズ動的計算 ---
        const playScreen = document.getElementById('play-screen');
        const screenRect = playScreen.getBoundingClientRect();
        
        // グリッドとトレイの行数を計算
        const gridRows = Math.floor((settings.max - 1) / 10) + 1;
        const itemCount = settings.max - settings.min + 1;
        const trayRows = Math.ceil(itemCount / 10);
        const totalRows = gridRows + trayRows;

        // 利用可能な幅と高さ（余白分を差し引く）
        const availW = screenRect.width - (SIDE_PADDING * 2);
        // 上部UI(60px)、間隔、下部ボタン領域(100px)等を考慮
        const reservedH = 180; 
        const availH = screenRect.height - reservedH;

        // 横幅基準のサイズ
        const sizeByWidth = Math.floor(availW / 10);
        // 高さ基準のサイズ（全ての行が収まるように）
        const sizeByHeight = Math.floor(availH / totalRows);

        // 小さい方を採用し、一画面に収める
        cellSize = Math.min(sizeByWidth, sizeByHeight);
        if (cellSize < 20) cellSize = 20; // 最小サイズ担保
        
        buildGrid();
        setTimeout(() => {
            buildBlocks();
        }, 50);
    }

    function nextQuestion() {
        if (currentQuestion < settings.maxQuestions) {
            currentQuestion++;
            prepareQuestion();
        } else {
            quitGame();
        }
    }

    function clearBlocks() {
        blocks.forEach(b => {
            if(b.el && b.el.parentNode) {
                b.el.parentNode.removeChild(b.el);
            }
        });
        blocks = [];
    }

    function buildGrid() {
        const gridContainer = document.getElementById('grid-container');
        gridContainer.innerHTML = '';
        panels = [];
        
        const yCount = Math.floor((settings.max - 1) / 10) + 1;
        
        for (let y = 0; y < yCount; y++) {
            for (let x = 1; x <= 10; x++) {
                const targetNum = y * 10 + x;
                const cell = document.createElement('div');
                cell.className = 'grid-cell';
                cell.style.width = `${cellSize}px`;
                cell.style.height = `${cellSize}px`;
                cell.style.fontSize = `${cellSize * 0.5}px`; 
                
                if (targetNum >= settings.min && targetNum <= settings.max) {
                    cell.classList.add('target');
                    cell.dataset.num = targetNum;
                    gridContainer.appendChild(cell);
                    panels.push({ num: targetNum, el: cell, answer: null });
                } else {
                    cell.classList.add('out-of-range');
                    cell.innerText = targetNum;
                    gridContainer.appendChild(cell);
                }
            }
        }
    }

    function buildBlocks() {
        const tray = document.getElementById('tray-container');
        panels.forEach(p => {
            const rect = p.el.getBoundingClientRect();
            p.x = rect.left;
            p.y = rect.top;
        });
        const trayRect = tray.getBoundingClientRect();
        
        // カードサイズはトレイの1マス幅と同じ（＝計算済みのcellSize）
        const blockSize = cellSize; 

        let startPoints = [];
        const itemCount = settings.max - settings.min + 1;
        for (let i = 0; i < itemCount; i++) {
            const col = i % 10;
            const row = Math.floor(i / 10);
            startPoints.push({
                x: col * cellSize,
                y: row * cellSize
            });
        }
        startPoints.sort(() => Math.random() - 0.5);

        // トレイ内の全カードの高さを計算し、下側に寄せる
        const trayRows = Math.ceil(itemCount / 10);
        const trayContentHeight = trayRows * cellSize;
        const trayTopOffset = trayRect.height - trayContentHeight; 

        let pointIndex = 0;
        for (let i = settings.min; i <= settings.max; i++) {
            const blockNum = i;
            const isLocked = (settings.mode === 'partial') && (blockNum % settings.interval === 0);

            const blockEl = document.createElement('div');
            blockEl.className = 'number-block animating';
            blockEl.innerText = blockNum;
            blockEl.style.width = `${blockSize}px`;
            blockEl.style.height = `${blockSize}px`;
            // 文字サイズをカードの8割に設定
            blockEl.style.fontSize = `${blockSize * 0.8}px`; 

            const startX = trayRect.left + SIDE_PADDING + startPoints[pointIndex].x;
            const startY = trayRect.top + trayTopOffset + startPoints[pointIndex].y;
            pointIndex++;

            let initialX, initialY;
            if (isLocked) {
                const targetPanel = panels.find(p => p.num === blockNum);
                initialX = targetPanel.x;
                initialY = targetPanel.y;
                targetPanel.answer = blockNum;
                blockEl.classList.add('correct');
            } else {
                initialX = startX;
                initialY = startY;
            }

            blockEl.style.left = `${initialX}px`;
            blockEl.style.top = `${initialY}px`;
            document.body.appendChild(blockEl);

            const blockObj = {
                num: blockNum,
                el: blockEl,
                isPlacedCorrectly: isLocked,
                isLocked: isLocked,
                startX: startX,
                startY: startY,
                currentX: initialX,
                currentY: initialY
            };
            blocks.push(blockObj);

            if (!isLocked) {
                setupDrag(blockObj, blockSize);
            }

            blockEl.addEventListener('click', (e) => {
                if (blockObj.isPlacedCorrectly && !blockObj.isLocked) {
                    const panel = panels.find(p => p.answer === blockObj.num);
                    if (panel) panel.answer = null;
                    blockObj.isPlacedCorrectly = false;
                    blockEl.classList.remove('correct');
                    moveBlockTo(blockObj, blockObj.startX, blockObj.startY);
                }
            });
        }
        
        if (panels.every(p => p.answer !== null)) {
            checkAllAnswer();
        }
    }

    function setupDrag(block, blockSize) {
        let isDragging = false;
        let offsetX, offsetY;

        block.el.addEventListener('pointerdown', (e) => {
            if (block.isPlacedCorrectly) return; 
            isDragging = true;
            block.el.classList.remove('animating');
            block.el.classList.add('dragging');
            block.el.style.zIndex = ++zIndexCounter;
            const rect = block.el.getBoundingClientRect();
            offsetX = e.clientX - rect.left;
            offsetY = e.clientY - rect.top;
            const panel = panels.find(p => p.answer === block.num);
            if (panel) panel.answer = null;
        });

        window.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            e.preventDefault(); 
            let newX = e.clientX - offsetX;
            let newY = e.clientY - offsetY;
            block.currentX = newX;
            block.currentY = newY;
            block.el.style.left = `${newX}px`;
            block.el.style.top = `${newY}px`;
        });

        window.addEventListener('pointerup', (e) => {
            if (!isDragging) return;
            isDragging = false;
            block.el.classList.remove('dragging');
            block.el.classList.add('animating');
            const blockCenterX = block.currentX + blockSize / 2;
            const blockCenterY = block.currentY + blockSize / 2;
            const snapThreshold = cellSize * 0.7; 
            let snapped = false;

            for (let panel of panels) {
                const panelCenterX = panel.x + cellSize / 2;
                const panelCenterY = panel.y + cellSize / 2;
                const distance = Math.hypot(blockCenterX - panelCenterX, blockCenterY - panelCenterY);
                if (distance < snapThreshold && panel.answer === null) {
                    moveBlockTo(block, panel.x, panel.y);
                    panel.answer = block.num;
                    snapped = true;
                    break;
                }
            }
            if (!snapped) {
                moveBlockTo(block, block.startX, block.startY);
            }
            setTimeout(checkAllAnswer, 350);
        });
    }

    function moveBlockTo(block, x, y) {
        block.currentX = x;
        block.currentY = y;
        block.el.style.left = `${x}px`;
        block.el.style.top = `${y}px`;
    }

    function checkAllAnswer() {
        const allFilled = panels.every(p => p.answer !== null);
        if (!allFilled) return;
        let allCorrect = true;
        panels.forEach(panel => {
            const block = blocks.find(b => b.num === panel.answer);
            if (!block) return;
            if (panel.num === panel.answer) {
                block.isPlacedCorrectly = true;
                block.el.classList.add('correct');
            } else {
                panel.answer = null;
                block.isPlacedCorrectly = false;
                block.el.classList.remove('correct');
                moveBlockTo(block, block.startX, block.startY);
                allCorrect = false;
            }
        });
        if (allCorrect) {
            playCorrectSound();
            document.getElementById('correct-mark').classList.add('show');
            const btn = document.getElementById('next-btn');
            btn.innerText = currentQuestion < settings.maxQuestions ? "つぎへ" : "ホームへ戻る";
            document.getElementById('overlay-ui').style.display = 'block';
        }
    }

    function playCorrectSound() {
        if (!audioCtx) return;
        try {
            const osc1 = audioCtx.createOscillator();
            const osc2 = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc1.type = 'sine';
            osc2.type = 'sine';
            osc1.frequency.setValueAtTime(659.25, audioCtx.currentTime); 
            osc2.frequency.setValueAtTime(880.00, audioCtx.currentTime + 0.15); 
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 0.05);
            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime + 0.15);
            gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4);
            osc1.connect(gainNode);
            osc2.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc1.start(audioCtx.currentTime);
            osc1.stop(audioCtx.currentTime + 0.15);
            osc2.start(audioCtx.currentTime + 0.15);
            osc2.stop(audioCtx.currentTime + 0.4);
        } catch(e) {}
    }

    initSettingsUI();
</script>
</body>
</html>
