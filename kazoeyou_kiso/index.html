<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>数えよう基礎</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&display=swap');

    /* --- 共通の誤操作防止とレイアウト要件 --- */
    :root {
        --vh: 1vh;
    }

    * {
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
    }
    
    input, select, textarea, button, label {
        -webkit-user-select: auto;
        -moz-user-select: auto;
        -ms-user-select: auto;
        user-select: auto;
    }

    html, body { 
        height: calc(var(--vh, 1vh) * 100);
        overflow: hidden; 
        margin: 0; padding: 0; 
        display: flex; flex-direction: column; 
        background: #fff; 
        font-family: "UD Digi Kyokasho N-R", "UD Digi Kyokasho N-B", "UDデジタル教科書体 N-R", "UDデジタル教科書体 N-B", "Klee One", sans-serif; 
    }
    
    .hidden { display: none !important; }
    
    /* --- UIコンポーネント --- */
    #header { 
        display: flex; align-items: flex-start; padding: 10px; height: 70px; 
        box-sizing: border-box; position: absolute; top: 0; left: 0; right: 0; width: 100%; 
        z-index: 100; pointer-events: none; 
    }
    .btn { 
        pointer-events: auto; font-size: 20px; padding: 5px 20px; cursor: pointer; 
        border-radius: 8px; border: 1px solid #ccc; background: #f9f9f9; 
        font-family: inherit; line-height: 1.2; text-align: center; 
    }
    
    /* ホーム画面 */
    #home-screen {
        position: absolute; top: 0; left: 0; width: 100vw; height: 100%;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: #fff; z-index: 50;
    }
    .home-title {
        font-weight: bold; color: #333; text-align: center;
    }
    .btn-ios-text {
        color: #007aff; background: transparent; border: none;
        font-weight: normal; cursor: pointer; padding: 15px; font-family: inherit;
        pointer-events: auto; letter-spacing: 2px;
    }
    .btn-ios-text:active {
        opacity: 0.3;
    }

    /* プレイ領域のみ touch-action: none を指定してスワイプを防止 */
    #game-area { flex-grow: 1; position: relative; width: 100vw; touch-action: none; }
    
    .square { position: absolute; border: 5px solid black; box-sizing: border-box; background: transparent; }
    .square.filled { background: yellow; }
    .square.hint { background: rgba(255, 255, 0, 0.2); }
    
    #quiz-target-text { position: absolute; width: 100%; text-align: center; font-size: 10vh; font-weight: bold; top: 5vh; font-family: inherit; }
    #quiz-box { position: absolute; border: 5px solid blue; background: rgba(0, 0, 255, 0.1); border-radius: 10px; box-sizing: border-box; }
    #btn-quiz-done { 
        position: absolute; top: 8vh; left: 2vw; background: orange; color: white; border: none; 
        font-size: 3vh; font-weight: bold; padding: 15px 30px; border-radius: 15px; 
        box-shadow: 0 4px 6px rgba(0,0,0,0.2); cursor: pointer; z-index: 10; pointer-events: auto; font-family: inherit; 
    }
    
    .piece { 
        position: absolute; border-radius: 50%; background: red; display: flex; align-items: center; 
        justify-content: center; font-weight: bold; color: white; touch-action: none; 
        z-index: 5; box-sizing: border-box; font-family: inherit; 
    }
    .piece.placed { border: 2px solid white; }
    .piece.dragging { z-index: 100; opacity: 0.8; }
    
    #feedback-layer { 
        position: absolute; top: 0; left: 0; width: 100vw; height: 100%; 
        background: rgba(255,255,255,0.5); z-index: 200; display: flex; flex-direction: column; 
        align-items: center; justify-content: center; 
    }
    .mark-circle { width: 15vh; height: 15vh; border: 10px solid red; border-radius: 50%; background: rgba(255,255,255,0.8); margin-bottom: 10vh; }
    .mark-cross { width: 15vh; height: 15vh; position: relative; margin-bottom: 10vh; }
    .mark-cross::before, .mark-cross::after { content: ''; position: absolute; width: 10px; height: 100%; background: blue; top: 0; left: 50%; transform: translateX(-50%) rotate(45deg); }
    .mark-cross::after { transform: translateX(-50%) rotate(-45deg); }
    #btn-next { font-size: 4vh; padding: 15px 40px; border-radius: 50px; background: yellow; border: none; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.2); font-family: inherit; }
    
    /* --- 設定画面 --- */
    #setting-view { 
        position: absolute; top: 0; left: 0; width: 100vw; height: 100%; 
        background: white; z-index: 300; display: flex; flex-direction: column; 
    }
    .setting-header { font-size: 24px; font-weight: bold; padding: 20px; border-bottom: 1px solid #ccc; text-align: center; flex-shrink: 0; }
    
    .setting-body { 
        display: flex; flex-direction: row; flex-grow: 1; overflow: hidden; 
        padding: 20px; gap: 20px; box-sizing: border-box; 
    }
    .setting-left { display: flex; flex-direction: column; flex: 1; gap: 20px; min-width: 0; }
    
    /* スクロール領域に -webkit-overflow-scrolling: touch; とセーフエリア余白を指定 */
    .setting-right { 
        flex: 1; overflow-y: auto; background: #fafafa; 
        padding: 20px 20px calc(80px + env(safe-area-inset-bottom)) 20px; 
        border-radius: 10px; border: 1px solid #eee; 
        -webkit-overflow-scrolling: touch; min-width: 0; 
    }
    
    .setting-common { background: #fafafa; padding: 20px; border-radius: 10px; border: 1px solid #eee; flex-shrink: 0; }

    #preview-wrapper { 
        flex-grow: 1; background: #f0f8ff; display: flex; justify-content: center; align-items: center; 
        border-radius: 10px; border: 1px solid #ccc; padding: 10px; box-sizing: border-box; 
        min-height: 200px; overflow: hidden; 
    }
    #setting-preview-container { 
        background: white; border: 1px solid #ddd; position: relative; 
        overflow: hidden; pointer-events: none; box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
    }
    
    .setting-section-title { font-size: 18px; font-weight: bold; color: #666; margin-bottom: 15px; border-bottom: 2px solid #ccc; padding-bottom: 5px; }
    
    .segmented-control { display: flex; width: 100%; background-color: #e0e0e0; border-radius: 10px; overflow: hidden; margin-bottom: 30px; flex-shrink: 0; }
    .segmented-control input[type="radio"] { display: none; }
    .segmented-control label { flex: 1; text-align: center; padding: 12px 0; cursor: pointer; font-size: 18px; color: #555; transition: background-color 0.2s, color 0.2s; border-right: 1px solid #ccc; }
    .segmented-control label:last-child { border-right: none; }
    .segmented-control input[type="radio"]:checked + label { background-color: #007aff; color: white; font-weight: bold; }

    .setting-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #eee; }
    .setting-row input[type="number"] { width: 60px; font-size: 20px; text-align: center; font-family: inherit; border: 1px solid #ccc; border-radius: 5px; padding: 5px;}
    #btn-save { margin: 20px; padding: 15px; font-size: 24px; background: blue; color: white; border: none; border-radius: 10px; cursor: pointer; font-family: inherit; flex-shrink: 0; }

    /* --- レスポンシブ --- */
    @media (max-width: 768px) {
        .setting-body { 
            flex-direction: column; overflow-y: auto; 
            padding: 20px 20px calc(80px + env(safe-area-inset-bottom)) 20px; 
            -webkit-overflow-scrolling: touch; 
        }
        .setting-left { flex: none; }
        .setting-right { flex: none; overflow-y: visible; padding: 0; background: transparent; border: none; }
        #preview-wrapper { min-height: 30vh; }
    }
</style>
</head>
<body>

<!-- ヘッダー -->
<div id="header">
    <button class="btn hidden" id="btn-home" onclick="goHome()">ホームに戻る</button>
</div>

<!-- ホーム画面 -->
<div id="home-screen">
    <!-- ホーム画面のモード選択セグメント -->
    <div class="segmented-control" style="width: 80%; max-width: 400px; margin-bottom: 5vh;">
        <input type="radio" name="home-mode" id="hmode-normal" value="normal">
        <label for="hmode-normal">ノーマル</label>
        <input type="radio" name="home-mode" id="hmode-quizAuto" value="quizAuto">
        <label for="hmode-quizAuto">クイズ(自動)</label>
        <input type="radio" name="home-mode" id="hmode-quizManual" value="quizManual">
        <label for="hmode-quizManual">クイズ(手動)</label>
    </div>

    <!-- シンプルなiOS風ボタン -->
    <button class="btn-ios-text" onclick="startGame()" style="font-size: 5vh; margin-bottom: 2vh;">スタート</button>
    <button class="btn-ios-text" id="btn-home-setting" style="font-size: 3vh;">設定</button>
</div>

<!-- プレイ画面 -->
<div id="game-area" class="hidden">
    <div id="quiz-target-text" class="hidden"></div>
    <div id="quiz-box" class="hidden"></div>
    <button id="btn-quiz-done" class="hidden" onclick="checkQuizManual()">できた！</button>
</div>

<!-- フィードバック画面 -->
<div id="feedback-layer" class="hidden">
    <div id="feedback-mark"></div>
    <button id="btn-next" class="hidden" onclick="nextQuestion()">つぎへ</button>
</div>

<!-- 設定画面 -->
<div id="setting-view" class="hidden">
    <div class="setting-header">設定</div>
    <div class="setting-body">
        <div class="setting-left">
            <div class="setting-common">
                <div class="setting-section-title">共通設定</div>
                <div class="setting-row">
                    <label>問題数</label>
                    <input type="number" id="s-question-count" min="1" max="50">
                </div>
                <div class="setting-row">
                    <label>ホームに戻るボタンを表示</label>
                    <input type="checkbox" id="s-show-back-button">
                </div>
                <div class="setting-row">
                    <label>効果音（正解・不正解）</label>
                    <input type="checkbox" id="s-se">
                </div>
                <div class="setting-row">
                    <label>出題時の読み上げ</label>
                    <input type="checkbox" id="s-voice-question">
                </div>
                <div class="setting-row">
                    <label>円を置いた時の読み上げ</label>
                    <input type="checkbox" id="s-voice-placement">
                </div>
            </div>
            <div id="preview-wrapper">
                <div id="setting-preview-container"></div>
            </div>
        </div>
        <div class="setting-right">
            <div class="setting-section-title">モード別設定</div>
            <div class="segmented-control">
                <input type="radio" name="mode" id="mode-normal" value="normal">
                <label for="mode-normal">ノーマル</label>
                <input type="radio" name="mode" id="mode-quizAuto" value="quizAuto">
                <label for="mode-quizAuto">クイズ(自動)</label>
                <input type="radio" name="mode" id="mode-quizManual" value="quizManual">
                <label for="mode-quizManual">クイズ(手動)</label>
            </div>

            <div class="setting-row">
                <label>最小値</label>
                <input type="number" id="s-min" min="1" max="20">
            </div>
            <div class="setting-row">
                <label>最大値</label>
                <input type="number" id="s-max" min="1" max="20">
            </div>
            <div class="setting-row">
                <label>円の数</label>
                <input type="number" id="s-pieces" min="1" max="30">
            </div>
            <div class="setting-row" id="row-s-left">
                <label>左から順に置く</label>
                <input type="checkbox" id="s-left">
            </div>
            <div class="setting-row">
                <label>円に数字を表示する</label>
                <input type="checkbox" id="s-overlay">
            </div>
            <div class="setting-row">
                <label>上部の数字表示</label>
                <input type="checkbox" id="s-show-number">
            </div>
        </div>
    </div>
    <button id="btn-save" onclick="saveSetting()">保存して閉じる</button>
</div>

<script>
    // --- 1. 確実な画面高さの取得とCSS変数へのセット ---
    function updateVh() {
        const vh = window.innerHeight * 0.01;
        document.documentElement.style.setProperty('--vh', `${vh}px`);
    }
    window.addEventListener('resize', updateVh);
    window.addEventListener('orientationchange', updateVh);
    updateVh();

    // --- 2. スワイプ・スクロール制御（誤操作防止） ---
    document.addEventListener('touchmove', function(e) {
        if (!e.target.closest('.setting-body') && !e.target.closest('.setting-right') && !e.target.closest('.setting-left')) {
            e.preventDefault();
        }
    }, { passive: false });

    // --- モード同期処理 (ホーム画面と設定画面のセグメントを連動) ---
    function syncMode(mode) {
        editingMode = mode;
        state.currentMode = mode;
        
        // 設定画面のラジオボタンを更新
        const settingRadio = document.querySelector(`input[name="mode"][value="${mode}"]`);
        if (settingRadio) settingRadio.checked = true;
        
        // ホーム画面のラジオボタンを更新
        const homeRadio = document.querySelector(`input[name="home-mode"][value="${mode}"]`);
        if (homeRadio) homeRadio.checked = true;

        updateSettingUI(mode);
    }

    document.querySelectorAll('input[name="mode"]').forEach(radio => {
        radio.addEventListener('change', (e) => {
            saveCurrentTabSettings(editingMode);
            syncMode(e.target.value);
        });
    });

    document.querySelectorAll('input[name="home-mode"]').forEach(radio => {
        radio.addEventListener('change', (e) => {
            syncMode(e.target.value);
            // ホーム画面でモードを変えたら即座に設定を保存する
            localStorage.setItem('appSetting_v3', JSON.stringify(state));
        });
    });

    // --- 設定トリプルタップ判定（ホーム画面の「設定」ボタンに適用） ---
    let tapCount = 0;
    let tapTimeout = null;
    document.getElementById('btn-home-setting').addEventListener('pointerdown', function(e) {
        initAudio();
        tapCount++;
        if (tapCount === 1) {
            tapTimeout = setTimeout(() => { tapCount = 0; }, 600);
        }
        if (tapCount >= 3) {
            clearTimeout(tapTimeout);
            tapCount = 0;
            openSetting();
        }
    });

    // --- 排他制御 (音声読み上げと上部の数字表示) ---
    document.getElementById('s-voice-question').addEventListener('change', function(e) {
        if (!this.checked && !document.getElementById('s-show-number').checked) {
            this.checked = true;
        }
    });
    document.getElementById('s-show-number').addEventListener('change', function(e) {
        if (!this.checked && !document.getElementById('s-voice-question').checked) {
            this.checked = true;
        }
    });

    // --- 状態管理 ---
    const defaultModeSettings = () => ({
        min: 1, max: 5, pieces: 5, setFromLeft: true, overlay: true, showNumber: true
    });

    const state = {
        currentMode: 'normal',
        common: { se: true, voiceQuestion: true, voicePlacement: true, questionCount: 5, showBackButton: true },
        settings: {
            normal: defaultModeSettings(),
            quizAuto: defaultModeSettings(),
            quizManual: defaultModeSettings()
        },
        targetNumber: 0, currentOrder: 1, currentQuestionIndex: 0, isProcessing: false, piecesData: [], targetsData: []
    };

    let editingMode = 'normal';

    function getSettings() {
        return state.settings[state.currentMode];
    }

    // --- 音声・読み上げ機能 (Web Audio API & SpeechSynthesis) ---
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioContext();

    function initAudio() {
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    function playCorrectSound() {
        if (!state.common.se) return;
        initAudio();
        const now = audioCtx.currentTime;
        const playTone = (freq, startTime, duration) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = freq;
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            gain.gain.setValueAtTime(0.5, startTime);
            gain.gain.exponentialRampToValueAtTime(0.01, startTime + duration);
            osc.start(startTime);
            osc.stop(startTime + duration);
        };
        playTone(783.99, now, 0.2); 
        playTone(1046.50, now + 0.15, 0.4);
    }

    function playIncorrectSound() {
        if (!state.common.se) return;
        initAudio();
        const now = audioCtx.currentTime;
        const playTone = (freq, startTime, duration) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.value = freq;
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            gain.gain.setValueAtTime(0.1, startTime);
            gain.gain.exponentialRampToValueAtTime(0.01, startTime + duration);
            osc.start(startTime);
            osc.stop(startTime + duration);
        };
        playTone(150, now, 0.2);
        playTone(150, now + 0.25, 0.3);
    }

    const synth = window.speechSynthesis;
    let isSpkInit = false;
    function initSpk() {
        if (!isSpkInit && (state.common.voiceQuestion || state.common.voicePlacement)) { 
            synth.speak(new SpeechSynthesisUtterance("")); 
            isSpkInit = true; 
        }
    }
    
    function spkQuestion(str) {
        if (!state.common.voiceQuestion) return;
        synth.cancel();
        let u = new SpeechSynthesisUtterance(String(str));
        u.lang = 'ja-JP';
        u.rate = 1.0;
        synth.speak(u);
    }

    function spkPlacement(str) {
        if (!state.common.voicePlacement) return;
        synth.cancel();
        let u = new SpeechSynthesisUtterance(String(str));
        u.lang = 'ja-JP';
        u.rate = 1.0;
        synth.speak(u);
    }

    // --- 画面制御 ---
    function goHome() {
        state.isProcessing = false;
        document.getElementById('home-screen').classList.remove('hidden');
        document.getElementById('game-area').classList.add('hidden');
        document.getElementById('feedback-layer').classList.add('hidden');
        document.getElementById('quiz-box').classList.add('hidden');
        document.getElementById('btn-quiz-done').classList.add('hidden');
        
        // ヘッダーの戻るボタンを隠す
        document.getElementById('btn-home').classList.add('hidden');
        
        // 盤面クリア
        const gameArea = document.getElementById('game-area');
        gameArea.querySelectorAll('.square, .piece').forEach(e => e.remove());

        // ホーム画面に戻った際にモード同期状態を確実に反映
        syncMode(state.currentMode);
    }

    function startGame() {
        initAudio();
        initSpk();
        
        state.currentQuestionIndex = 0;
        document.getElementById('home-screen').classList.add('hidden');
        document.getElementById('game-area').classList.remove('hidden');
        
        // ヘッダーのボタン表示切替
        if (state.common.showBackButton) {
            document.getElementById('btn-home').classList.remove('hidden');
        } else {
            document.getElementById('btn-home').classList.add('hidden');
        }
        
        resetGame();
    }

    // --- 設定の保存と読み込み ---
    function loadSetting() {
        const saved = localStorage.getItem('appSetting_v3');
        if (saved) {
            Object.assign(state, JSON.parse(saved));
            ['normal', 'quizAuto', 'quizManual'].forEach(m => {
                if (!state.settings[m]) state.settings[m] = defaultModeSettings();
            });
            // 新規追加項目のフォールバック
            if (state.common.questionCount === undefined) state.common.questionCount = 5;
            if (state.common.showBackButton === undefined) state.common.showBackButton = true;
        } else {
            const oldSaved = localStorage.getItem('appSetting_v2');
            if (oldSaved) {
                const old = JSON.parse(oldSaved);
                state.currentMode = old.currentMode || 'normal';
                
                const ref = (old.settings && old.settings.normal) ? old.settings.normal : {};
                state.common.se = ref.se !== undefined ? ref.se : true;
                state.common.voiceQuestion = ref.voice !== undefined ? ref.voice : true;
                state.common.voicePlacement = ref.voice !== undefined ? ref.voice : true;

                ['normal', 'quizAuto', 'quizManual'].forEach(m => {
                    const mOld = (old.settings && old.settings[m]) ? old.settings[m] : {};
                    state.settings[m] = {
                        min: mOld.min || 1, max: mOld.max || 5, pieces: mOld.pieces || 5,
                        setFromLeft: mOld.setFromLeft !== undefined ? mOld.setFromLeft : true,
                        overlay: mOld.overlay !== undefined ? mOld.overlay : true,
                        showNumber: mOld.showNumber !== undefined ? mOld.showNumber : true
                    };
                });
            }
        }
        // 読み込み完了時にセグメントを同期させる
        syncMode(state.currentMode);
    }

    function updatePreviewLayout() {
        const wrapper = document.getElementById('preview-wrapper');
        const container = document.getElementById('setting-preview-container');
        if (!wrapper || !container) return;

        const screenRatio = window.innerHeight / window.innerWidth;
        const wrapperW = wrapper.clientWidth;
        const wrapperH = wrapper.clientHeight;
        
        const maxW = wrapperW - 20;
        const maxH = wrapperH - 20;

        let targetW = maxH / screenRatio;
        let targetH = maxH;

        if (targetW > maxW) {
            targetW = maxW;
            targetH = targetW * screenRatio;
        }

        container.style.width = targetW + 'px';
        container.style.height = targetH + 'px';
    }

    function updateSettingUI(mode) {
        document.getElementById('s-question-count').value = state.common.questionCount;
        document.getElementById('s-show-back-button').checked = state.common.showBackButton;
        document.getElementById('s-se').checked = state.common.se;
        document.getElementById('s-voice-question').checked = state.common.voiceQuestion;
        document.getElementById('s-voice-placement').checked = state.common.voicePlacement;

        const s = state.settings[mode];
        document.getElementById('s-min').value = s.min;
        document.getElementById('s-max').value = s.max;
        document.getElementById('s-pieces').value = s.pieces;
        document.getElementById('s-overlay').checked = s.overlay;
        document.getElementById('s-show-number').checked = s.showNumber;
        
        const leftRow = document.getElementById('row-s-left');
        if (mode === 'normal') {
            leftRow.classList.remove('hidden');
            document.getElementById('s-left').checked = s.setFromLeft;
        } else {
            leftRow.classList.add('hidden');
        }
        renderPreview();
    }

    function saveCurrentTabSettings(mode) {
        state.common.questionCount = parseInt(document.getElementById('s-question-count').value) || 5;
        state.common.showBackButton = document.getElementById('s-show-back-button').checked;
        state.common.se = document.getElementById('s-se').checked;
        state.common.voiceQuestion = document.getElementById('s-voice-question').checked;
        state.common.voicePlacement = document.getElementById('s-voice-placement').checked;

        const s = state.settings[mode];
        s.min = parseInt(document.getElementById('s-min').value) || 1;
        s.max = parseInt(document.getElementById('s-max').value) || 5;
        s.pieces = parseInt(document.getElementById('s-pieces').value) || 5;
        s.overlay = document.getElementById('s-overlay').checked;
        s.showNumber = document.getElementById('s-show-number').checked;
        
        if (s.pieces < s.max) s.pieces = s.max;
        if (s.min > s.max) s.min = s.max;

        if (mode === 'normal') {
            s.setFromLeft = document.getElementById('s-left').checked;
        }
    }

    const settingInputs = document.querySelectorAll('#setting-view input:not([name="mode"]):not([name="home-mode"])');
    settingInputs.forEach(input => {
        input.addEventListener('input', renderPreview);
        input.addEventListener('change', renderPreview);
    });

    function openSetting() {
        loadSetting();
        document.getElementById('setting-view').classList.remove('hidden');
        updatePreviewLayout();
        
        setTimeout(renderPreview, 10);
    }

    function saveSetting() {
        saveCurrentTabSettings(editingMode);
        state.currentMode = editingMode;
        localStorage.setItem('appSetting_v3', JSON.stringify(state));
        document.getElementById('setting-view').classList.add('hidden');
        goHome(); // 設定変更後はホームに戻る
    }

    // --- プレビューの描画 ---
    function renderPreview() {
        const container = document.getElementById('setting-preview-container');
        if(!container || container.clientWidth === 0) return;
        container.innerHTML = '';
        
        const w = container.clientWidth;
        const h = container.clientHeight;
        const scale = w / window.innerWidth;
        
        const mode = editingMode;
        const min = parseInt(document.getElementById('s-min').value) || 1;
        const max = parseInt(document.getElementById('s-max').value) || 5;
        const pieces = parseInt(document.getElementById('s-pieces').value) || 5;
        const setFromLeft = document.getElementById('s-left').checked;
        const overlay = document.getElementById('s-overlay').checked;
        const showNumber = document.getElementById('s-show-number').checked;
        
        let targetNum = Math.floor((min + max) / 2);
        if(targetNum < min) targetNum = min;
        if(targetNum > max) targetNum = max;
        
        let pSize = Math.max(60 * scale, Math.min(w, h) / 7);
        
        if (showNumber) {
            const txt = document.createElement('div');
            txt.textContent = targetNum;
            txt.style.position = 'absolute';
            txt.style.width = '100%';
            txt.style.textAlign = 'center';
            txt.style.fontSize = (10 * scale) + 'vh';
            txt.style.fontWeight = 'bold';
            txt.style.top = (5 * scale) + 'vh';
            txt.style.fontFamily = 'inherit';
            container.appendChild(txt);
        }
        
        if (mode === 'normal') {
            let spacing = pSize - (5 * scale);
            if (spacing * targetNum > w * 0.9) {
                spacing = (w * 0.9) / targetNum;
                pSize = spacing + (5 * scale);
            }
            const totalW = spacing * (targetNum - 1) + pSize;
            const startX = w / 2 - totalW / 2 + pSize / 2;
            const squareY = showNumber ? Math.max(pSize * 1.5, h * 0.25) : Math.max(pSize * 1.5, h * 0.2);
            const pieceY = h - pSize * 1.5;
            
            for(let i=0; i<targetNum; i++) {
                const sq = document.createElement('div');
                sq.className = 'square' + (i===0 && setFromLeft ? ' hint' : (!setFromLeft ? ' hint' : ''));
                sq.style.width = pSize + 'px'; sq.style.height = pSize + 'px';
                sq.style.left = (startX + i * spacing - pSize/2) + 'px';
                sq.style.top = (squareY - pSize/2) + 'px';
                sq.style.borderWidth = Math.max(1, 5 * scale) + 'px';
                container.appendChild(sq);
                
                const p = document.createElement('div');
                p.className = 'piece';
                const r = pSize * 0.75;
                p.style.width = r + 'px'; p.style.height = r + 'px';
                p.style.left = (startX + i * spacing - r/2) + 'px';
                p.style.top = (pieceY - r/2) + 'px';
                if(overlay) {
                    p.textContent = i+1;
                    p.style.fontSize = (pSize*0.4) + 'px';
                }
                container.appendChild(p);
            }
        } else {
            const box = document.createElement('div');
            const boxW = w * 0.9; 
            const boxH = Math.max(pSize * 2.5, h * 0.4);
            const boxX = (w - boxW) / 2;
            const boxY = Math.max(pSize * 1.5, h * 0.15);
            
            box.style.position = 'absolute';
            box.style.border = Math.max(1, 5 * scale) + 'px solid blue';
            box.style.background = 'rgba(0,0,255,0.1)';
            box.style.borderRadius = (10 * scale) + 'px';
            box.style.width = boxW + 'px'; box.style.height = boxH + 'px';
            box.style.left = boxX + 'px';
            box.style.top = boxY + 'px';
            container.appendChild(box);
            
            if (mode === 'quizManual') {
                const btn = document.createElement('div');
                btn.textContent = 'できた！';
                btn.style.position = 'absolute';
                btn.style.left = '2vw'; btn.style.top = '8vh';
                btn.style.fontSize = (3 * scale) + 'vh'; btn.style.padding = (15 * scale) + 'px ' + (30 * scale) + 'px';
                btn.style.background = 'orange'; btn.style.color = 'white'; btn.style.borderRadius = (15 * scale) + 'px';
                btn.style.fontWeight = 'bold';
                container.appendChild(btn);
            }

            const num = pieces;
            let spacing = num > 1 ? Math.min((w * 0.9 - pSize) / (num - 1), pSize * 1.1) : 0;
            const totalW = spacing * (num - 1);
            const startX = (w - totalW) / 2;
            const pieceY = h - pSize * 1.2;
            
            for (let i = 0; i < num; i++) {
                const p = document.createElement('div');
                p.className = 'piece';
                const r = pSize * 0.75;
                p.style.width = r + 'px'; p.style.height = r + 'px';
                p.style.left = (startX + i * spacing - r/2) + 'px';
                p.style.top = (pieceY - r/2) + 'px';
                container.appendChild(p);
            }
        }
    }

    // --- ゲームのメインロジック ---
    const gameArea = document.getElementById('game-area');
    let pieceSize = 0;
    let draggingPiece = null;

    function resetGame() {
        state.isProcessing = false;
        gameArea.querySelectorAll('.square, .piece').forEach(e => e.remove());
        document.getElementById('feedback-layer').classList.add('hidden');
        document.getElementById('quiz-box').classList.add('hidden');
        document.getElementById('btn-quiz-done').classList.add('hidden');
        
        const w = window.innerWidth;
        const h = window.innerHeight;
        pieceSize = Math.max(60, Math.min(w, h) / 7); 
        
        const s = getSettings();
        state.targetNumber = Math.floor(Math.random() * (s.max - s.min + 1)) + s.min;
        spkQuestion(state.targetNumber);

        const txt = document.getElementById('quiz-target-text');
        txt.textContent = state.targetNumber;
        if (s.showNumber) {
            txt.classList.remove('hidden');
        } else {
            txt.classList.add('hidden');
        }

        if (state.currentMode === 'normal') {
            setupNormalMode(w, h);
        } else {
            setupQuizMode(w, h);
        }
    }

    function setupNormalMode(w, h) {
        state.currentOrder = 1;
        state.targetsData = [];
        state.piecesData = [];
        
        const s = getSettings();
        let spacing = pieceSize - 5; // 四角の重なりを防ぐ調整
        if (spacing * state.targetNumber > w * 0.9) {
            spacing = (w * 0.9) / state.targetNumber;
            pieceSize = spacing + 5; 
        }

        const totalW = spacing * (state.targetNumber - 1) + pieceSize;
        const startX = w / 2 - totalW / 2 + pieceSize / 2;
        const squareY = s.showNumber ? Math.max(pieceSize * 1.5, h * 0.25) : Math.max(pieceSize * 1.5, h * 0.2);
        const pieceY = h - pieceSize * 1.5;

        for (let i = 0; i < state.targetNumber; i++) {
            const x = startX + i * spacing;
            createSquare(i, x, squareY);
            state.targetsData.push({ id: i, x: x, y: squareY, filled: false });
            
            const p = createPiece(i, x, pieceY, true);
            state.piecesData.push({ el: p, id: i, isPlaced: false });
        }
        updateHint();
    }

    function createSquare(id, x, y) {
        const sq = document.createElement('div');
        sq.className = 'square';
        sq.id = 'sq-' + id;
        sq.style.width = pieceSize + 'px';
        sq.style.height = pieceSize + 'px';
        sq.style.left = (x - pieceSize/2) + 'px';
        sq.style.top = (y - pieceSize/2) + 'px';
        gameArea.appendChild(sq);
    }

    function updateHint() {
        const s = getSettings();
        if (!s.setFromLeft) {
            state.targetsData.forEach(t => document.getElementById('sq-' + t.id).classList.add('hint'));
            return;
        }
        let firstEmptyIndex = state.targetsData.findIndex(t => !t.filled);
        state.targetsData.forEach((t, i) => {
            const sq = document.getElementById('sq-' + t.id);
            if (i === firstEmptyIndex) sq.classList.add('hint');
            else sq.classList.remove('hint');
        });
    }

    let quizRect = { x: 0, y: 0, w: 0, h: 0 };
    function setupQuizMode(w, h) {
        const box = document.getElementById('quiz-box');
        quizRect.w = w * 0.9;
        quizRect.h = Math.max(pieceSize * 2.5, h * 0.4);
        quizRect.x = (w - quizRect.w) / 2;
        quizRect.y = Math.max(pieceSize * 1.5, h * 0.15); 
        box.style.width = quizRect.w + 'px';
        box.style.height = quizRect.h + 'px';
        box.style.left = quizRect.x + 'px';
        box.style.top = quizRect.y + 'px';
        box.classList.remove('hidden');

        if (state.currentMode === 'quizManual') {
            document.getElementById('btn-quiz-done').classList.remove('hidden');
        }

        state.piecesData = [];
        const num = getSettings().pieces;
        let spacing = num > 1 ? Math.min((w * 0.9 - pieceSize) / (num - 1), pieceSize * 1.1) : 0;
        const totalW = spacing * (num - 1);
        const startX = (w - totalW) / 2;
        const pieceY = h - pieceSize * 1.2;

        for (let i = 0; i < num; i++) {
            const x = startX + i * spacing;
            const p = createPiece(i, x, pieceY, false);
            state.piecesData.push({ el: p, id: i, startX: x, startY: pieceY, isPlaced: false });
        }
    }

    function layoutQuizPieces() {
        const placed = state.piecesData.filter(p => p.isPlaced).sort((a,b) => a.el.offsetLeft - b.el.offsetLeft);
        const padding = quizRect.w * 0.05;
        const availableW = quizRect.w - (padding * 2) - pieceSize;
        const count = Math.max(1, getSettings().pieces);
        let spacing = count > 1 ? Math.min(availableW / (count - 1), pieceSize * 1.2) : 0;
        const startX = quizRect.x + padding + (pieceSize / 2);
        const targetY = quizRect.y + quizRect.h / 2;

        placed.forEach((p, index) => {
            const targetX = startX + index * spacing;
            p.el.style.transition = 'left 0.25s, top 0.25s';
            p.el.style.left = (targetX - pieceSize*0.75/2) + 'px';
            p.el.style.top = (targetY - pieceSize*0.75/2) + 'px';
            updatePieceText(p.el, index + 1);
        });
    }

    function updatePieceText(el, number) {
        if (getSettings().overlay) {
            el.textContent = number;
            el.style.fontSize = (pieceSize * 0.4) + 'px';
        } else {
            el.textContent = "";
        }
    }

    function createPiece(id, x, y, isNormal) {
        const p = document.createElement('div');
        p.className = 'piece';
        p.dataset.id = id;
        const r = pieceSize * 0.75;
        p.style.width = r + 'px';
        p.style.height = r + 'px';
        p.style.left = (x - r/2) + 'px';
        p.style.top = (y - r/2) + 'px';

        p.addEventListener('pointerdown', onPointerDown);
        gameArea.appendChild(p);
        return p;
    }

    // --- ドラッグ＆ドロップ制御 ---
    let dragStartX, dragStartY, initialLeft, initialTop;

    function onPointerDown(e) {
        if (state.isProcessing) return;
        const id = parseInt(e.target.dataset.id);
        const pData = state.piecesData.find(p => p.id === id);
        
        initAudio();
        initSpk();
        draggingPiece = pData;
        draggingPiece.el.setPointerCapture(e.pointerId);
        draggingPiece.el.classList.add('dragging');
        draggingPiece.el.style.transition = 'none';
        
        if (state.currentMode !== 'normal') {
            draggingPiece.isPlaced = false;
            draggingPiece.el.classList.remove('placed');
            draggingPiece.el.textContent = "";
            layoutQuizPieces();
        }

        dragStartX = e.clientX;
        dragStartY = e.clientY;
        initialLeft = parseFloat(draggingPiece.el.style.left);
        initialTop = parseFloat(draggingPiece.el.style.top);

        draggingPiece.el.addEventListener('pointermove', onPointerMove);
        draggingPiece.el.addEventListener('pointerup', onPointerUp);
        draggingPiece.el.addEventListener('pointercancel', onPointerUp);
    }

    function onPointerMove(e) {
        if (!draggingPiece) return;
        const dx = e.clientX - dragStartX;
        const dy = e.clientY - dragStartY;
        draggingPiece.el.style.left = (initialLeft + dx) + 'px';
        draggingPiece.el.style.top = (initialTop + dy) + 'px';
    }

    function onPointerUp(e) {
        if (!draggingPiece) return;
        const el = draggingPiece.el;
        el.classList.remove('dragging');
        el.releasePointerCapture(e.pointerId);
        el.removeEventListener('pointermove', onPointerMove);
        el.removeEventListener('pointerup', onPointerUp);
        el.removeEventListener('pointercancel', onPointerUp);

        const cx = parseFloat(el.style.left) + el.offsetWidth / 2;
        const cy = parseFloat(el.style.top) + el.offsetHeight / 2;

        if (state.currentMode === 'normal') {
            handleNormalDrop(cx, cy);
        } else {
            handleQuizDrop(cx, cy);
        }
        draggingPiece = null;
    }

    function handleNormalDrop(cx, cy) {
        const s = getSettings();
        let snapped = false;
        for (let i = 0; i < state.targetsData.length; i++) {
            const t = state.targetsData[i];
            if (Math.abs(cx - t.x) < pieceSize/2 && Math.abs(cy - t.y) < pieceSize/2) {
                let canPlace = true;
                if (s.setFromLeft) {
                    for (let j = 0; j < i; j++) {
                        if (!state.targetsData[j].filled) canPlace = false;
                    }
                }
                if (canPlace && !t.filled) {
                    t.filled = true;
                    draggingPiece.isPlaced = true;
                    draggingPiece.el.style.transition = 'left 0.2s, top 0.2s';
                    draggingPiece.el.style.left = (t.x - draggingPiece.el.offsetWidth/2) + 'px';
                    draggingPiece.el.style.top = (t.y - draggingPiece.el.offsetHeight/2) + 'px';
                    draggingPiece.el.style.pointerEvents = 'none';
                    
                    document.getElementById('sq-' + t.id).classList.add('filled');
                    
                    let numToSpk = s.setFromLeft ? (i + 1) : state.currentOrder++;
                    updatePieceText(draggingPiece.el, numToSpk);
                    spkPlacement(numToSpk);
                    updateHint();
                    snapped = true;
                    
                    if (state.targetsData.every(x => x.filled)) {
                        showSuccess();
                    }
                    break;
                }
            }
        }
        if (!snapped) {
            draggingPiece.el.style.transition = 'left 0.3s, top 0.3s';
            draggingPiece.el.style.left = initialLeft + 'px';
            draggingPiece.el.style.top = initialTop + 'px';
        }
    }

    function handleQuizDrop(cx, cy) {
        const inBox = cx >= quizRect.x && cx <= quizRect.x + quizRect.w && cy >= quizRect.y && cy <= quizRect.y + quizRect.h;
        if (inBox) {
            state.isProcessing = true;
            draggingPiece.isPlaced = true;
            draggingPiece.el.classList.add('placed');
            
            const placedCount = state.piecesData.filter(p => p.isPlaced).length;
            spkPlacement(placedCount);
            
            if (state.currentMode === 'quizAuto') {
                if (placedCount === state.targetNumber) {
                    layoutQuizPieces();
                    showSuccess();
                    return;
                }
            }
            layoutQuizPieces();
            setTimeout(() => { state.isProcessing = false; }, 300);
        } else {
            draggingPiece.isPlaced = false;
            draggingPiece.el.classList.remove('placed');
            draggingPiece.el.style.transition = 'left 0.3s, top 0.3s';
            draggingPiece.el.style.left = (draggingPiece.startX - draggingPiece.el.offsetWidth/2) + 'px';
            draggingPiece.el.style.top = (draggingPiece.startY - draggingPiece.el.offsetHeight/2) + 'px';
            layoutQuizPieces();
        }
    }

    function checkQuizManual() {
        const count = state.piecesData.filter(p => p.isPlaced).length;
        if (count === state.targetNumber) {
            showSuccess();
        } else {
            showFail();
        }
    }

    // --- フィードバックとリセット ---
    function showSuccess() {
        playCorrectSound();
        const layer = document.getElementById('feedback-layer');
        const mark = document.getElementById('feedback-mark');
        const btn = document.getElementById('btn-next');
        layer.classList.remove('hidden');
        layer.style.background = 'rgba(255,255,255,0.5)';
        mark.className = 'mark-circle';
        btn.classList.remove('hidden');
    }

    function showFail() {
        playIncorrectSound();
        const layer = document.getElementById('feedback-layer');
        const mark = document.getElementById('feedback-mark');
        const btn = document.getElementById('btn-next');
        layer.classList.remove('hidden');
        layer.style.background = 'transparent';
        mark.className = 'mark-cross';
        btn.classList.add('hidden');
        setTimeout(() => {
            layer.classList.add('hidden');
        }, 1000);
    }

    function nextQuestion() {
        state.currentQuestionIndex++;
        if (state.currentQuestionIndex >= state.common.questionCount) {
            goHome();
        } else {
            resetGame();
        }
    }

    // リサイズ時の再描画（デバウンス処理）
    let resizeTimer;
    window.addEventListener('resize', () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => {
            if (!document.getElementById('setting-view').classList.contains('hidden')) {
                updatePreviewLayout();
                renderPreview();
            }
            if (document.getElementById('home-screen').classList.contains('hidden')) {
                resetGame(); // プレイ中なら盤面を再描画
            }
        }, 200);
    });
    
    // --- 初期化処理 ---
    loadSetting();
    goHome(); // 初期状態はホーム画面
</script>
</body>
</html>
