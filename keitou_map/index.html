        .eh-preview, .eh-ghost-edge { background-color: #ef4444; line-color: #ef4444; target-arrow-color: #ef4444; source-arrow-color: #ef4444; }

        <div>
            <h1 class="text-xl font-bold tracking-tight">段階別教科アプリ系統マップ（エディタ）</h1>
            <p id="mode-desc" class="text-xs text-rose-400 font-bold">移動中：ノードをドラッグして配置を調整できます</p>
        </div>
        <div class="flex gap-4 text-sm font-bold items-center">
            <div class="flex items-center gap-2 mr-4">
                <div class="bg-rose-900/40 px-3 py-1 rounded border border-rose-500/50 text-rose-200 text-xs">国語</div>
                <div class="bg-emerald-900/40 px-3 py-1 rounded border border-emerald-500/50 text-emerald-200 text-xs">自立活動</div>
                <div class="bg-blue-900/40 px-3 py-1 rounded border border-blue-500/50 text-blue-200 text-xs">算数</div>
            </div>
            <button id="btn-toggle-draw" class="bg-indigo-600 hover:bg-indigo-500 px-4 py-2 rounded text-white transition-colors">線引きモードにする</button>
            <button id="btn-edit" class="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded text-white hidden transition-colors">編集モードに戻る</button>
            <button id="btn-view" class="bg-emerald-600 hover:bg-emerald-500 px-4 py-2 rounded text-white transition-colors">出力＆閲覧モードにする</button>
        </div>
    </header>

    <div id="cy"></div>

        <textarea id="export-text" readonly></textarea>

            const importedNode = importedData.find(item => item.group === 'nodes' && item.data.id === n.id);
            const position = importedNode && importedNode.position ? importedNode.position : { x: 0, y: 0 };
            initialElements.push({
                group: 'nodes',
                data: { 
                    id: n.id, 
                    name: n.name, 
                    goal: n.goal, 
                    stage: n.stage,
                    type: n.type,
                    url: n.url,
                    color: n.type === 'jp' ? '#f43f5e' : (n.type === 'support' ? '#10b981' : '#3b82f6')
                },
                position: position
            });
        });
        importedData.forEach(item => {
            if (item.group === 'edges') {
                if(!item.data.source.startsWith('bg') && !item.data.target.startsWith('bg')){
                    initialElements.push({
                        group: 'edges',
                        data: { id: item.data.id, source: item.data.source, target: item.data.target }
                    });
                }
            }
        });

        document.addEventListener('DOMContentLoaded', function() {
            const cy = cytoscape({
                container: document.getElementById('cy'),
                elements: initialElements,
                style: [
                    {
                        selector: 'node',
                        style: {
                            'label': function(ele) { return ele.data('url') ? ele.data('name') + ' 🔗' : ele.data('name'); },
                            'width': '140px',
                            'height': '36px',
                            'background-color': 'data(color)',
                            'color': '#fff',
                            'font-size': '11px',
                            'font-weight': 'bold',
                            'text-valign': 'center',
                            'text-halign': 'center',
                            'shape': 'round-rectangle',
                            'border-width': 2,
                            'border-color': '#fff',
                            'z-index-compare': 'manual',
                            'z-index': 10
                        }
                    },
                    {
                        selector: 'node[type="bg"]',
                        style: {
                            'shape': 'rectangle',
                            'width': bgWidth,
                            'height': bgHeight,
                            'background-color': 'data(bgColor)',
                            'label': 'data(name)',
                            'text-valign': 'top',
                            'text-halign': 'center',
                            'text-margin-y': 20,
                            'font-size': '20px',
                            'font-weight': 'bold',
                            'color': '#94a3b8',
                            'border-width': 1,
                            'border-color': '#e2e8f0',
                            'z-index-compare': 'manual',
                            'z-index': 1,
                            'events': 'no' 
                        }
                    },
                    {
                        selector: 'edge',
                        style: {
                            'width': 2,
                            'line-color': '#94a3b8',
                            'target-arrow-color': '#94a3b8',
                            'target-arrow-shape': 'triangle',
                            'curve-style': 'bezier',
                            'z-index-compare': 'manual',
                            'z-index': 5
                        }
                    },
                    { selector: '.eh-handle', style: { 'background-color': '#ef4444', 'width': 10, 'height': 10, 'shape': 'ellipse', 'overlay-opacity': 0, 'border-width': 8, 'border-opacity': 0, 'z-index-compare': 'manual', 'z-index': 20 } },
                    { selector: '.eh-source', style: { 'border-width': 4, 'border-color': '#ef4444', 'z-index-compare': 'manual', 'z-index': 15 } },
                    { selector: '.eh-target', style: { 'border-width': 4, 'border-color': '#ef4444', 'z-index-compare': 'manual', 'z-index': 15 } },
                    { selector: '.eh-preview, .eh-ghost-edge', style: { 'background-color': '#ef4444', 'line-color': '#ef4444', 'target-arrow-color': '#ef4444', 'source-arrow-color': '#ef4444', 'z-index-compare': 'manual', 'z-index': 15 } },
                    { selector: '.eh-ghost-edge.eh-preview-active', style: { 'opacity': 0 } }
                ],
                layout: { name: 'preset' }
            });

            cy.fit(null, 50);

            let eh = null;
            if (typeof cy.edgehandles === 'function') {
                eh = cy.edgehandles({ 
                    snap: true, 
                    noEdgeEventsInDraw: true, 
                    disableBrowserGestures: true,
                    handleNodes: 'node[type != "bg"]'
                });
            }

            const activeTippies = [];

            cy.nodes().forEach(node => {
                if(node.data('type') === 'bg') return;
                
                const dummyDom = document.createElement('div');
                const urlHtml = node.data('url') ? `<a href="${node.data('url')}" target="_blank" class="app-link">🔗 アプリを開く</a>` : '';
                
                const tippyInstance = tippy(dummyDom, {
                    getReferenceClientRect: node.popperRef().getBoundingClientRect,
                    content: `
                        <div class="tooltip-content">
                            <div class="font-bold text-[10px] border-b border-slate-600 pb-1">段階: ${node.data('stage')}</div>
                            <div class="text-xs mb-1">🎯 ${node.data('goal')}</div>
                            ${urlHtml}
                        </div>
                    `,
                    allowHTML: true,
                    theme: 'edu-dark',
                    placement: 'top',
                    trigger: 'manual', 
                    animation: 'shift-away',
                    interactive: true,
                    hideOnClick: false,
                    appendTo: document.body
                });
                
                activeTippies.push(tippyInstance);

                const showTippy = (e) => {
                    if (isDrawMode) return; 
                    
                    if (tippyInstance.state.isVisible) {
                        tippyInstance.hide();
                        return;
                    }
                    
                    activeTippies.forEach(t => { if(t !== tippyInstance) t.hide(); });
                    tippyInstance.setProps({ getReferenceClientRect: node.popperRef().getBoundingClientRect });
                    tippyInstance.show();
                    
                    if (e && (e.type === 'tap' || e.type === 'click')) {
                        setTimeout(() => {
                            document.addEventListener('click', hideTippyOnClickOutside);
                        }, 10);
                    }
                };

                const hideTippyOnClickOutside = (event) => {
                    const isClickInsideTippy = event.target.closest('.tippy-box');
                    const isClickOnNode = event.target.closest('canvas');
                    
                    if (!isClickInsideTippy && !isClickOnNode) {
                         tippyInstance.hide();
                         document.removeEventListener('click', hideTippyOnClickOutside);
                    }
                };

                node.on('tap', showTippy);

                node.on('mouseover', () => {
                    if(node.data('url')) node.style('cursor', 'pointer');
                });

                node.on('position drag zoom pan', () => {
                   if (tippyInstance.state.isVisible) {
                       tippyInstance.setProps({ getReferenceClientRect: node.popperRef().getBoundingClientRect });
                   }
                });
            });


            const btnEdit = document.getElementById('btn-edit');
            const btnView = document.getElementById('btn-view');
            const btnToggleDraw = document.getElementById('btn-toggle-draw');
            const modeDesc = document.getElementById('mode-desc');
            const exportModal = document.getElementById('export-modal');
            const exportText = document.getElementById('export-text');

            let isDrawMode = false;

            btnToggleDraw.addEventListener('click', () => {
                if (!eh) return alert("プラグインがロードされていません。");
                isDrawMode = !isDrawMode;
                if (isDrawMode) {
                    eh.enableDrawMode();
                    activeTippies.forEach(t => t.hide());
                    btnToggleDraw.innerText = "移動モードにする";
                    btnToggleDraw.classList.replace('bg-indigo-600', 'bg-amber-600');
                    btnToggleDraw.classList.replace('hover:bg-indigo-500', 'hover:bg-amber-500');
                    modeDesc.innerText = "線引き中：ノードからノードへドラッグして線を結びます";
                    modeDesc.className = "text-xs text-indigo-400 font-bold";
                } else {
                    eh.disableDrawMode();
                    btnToggleDraw.innerText = "線引きモードにする";
                    btnToggleDraw.classList.replace('bg-amber-600', 'bg-indigo-600');
                    btnToggleDraw.classList.replace('hover:bg-amber-500', 'hover:bg-indigo-500');
                    modeDesc.innerText = "移動中：ノードをドラッグして配置を調整できます";
                    modeDesc.className = "text-xs text-rose-400 font-bold";
                }
            });

            btnView.addEventListener('click', () => {
                if (eh) { eh.disableDrawMode(); eh.disable(); }
                cy.autolock(true);
                btnView.classList.add('hidden');
                btnToggleDraw.classList.add('hidden');
                btnEdit.classList.remove('hidden');
                modeDesc.innerText = "閲覧モード：配置と線は固定されています";
                modeDesc.className = "text-xs text-emerald-400 font-bold";
                const exportData = cy.elements().filter(ele => ele.data('type') !== 'bg').map(ele => ({
                    group: ele.group(),
                    data: { id: ele.data('id'), source: ele.data('source'), target: ele.data('target') },
                    position: ele.isNode() ? ele.position() : undefined
                }));
                exportText.value = JSON.stringify(exportData, null, 2);
                exportModal.style.display = 'block';
            });

            btnEdit.addEventListener('click', () => {
                if (eh) eh.enable();
                if (isDrawMode && eh) {
                    eh.enableDrawMode();
                    modeDesc.innerText = "線引き中：ノードからノードへドラッグして線を結びます";
                    modeDesc.className = "text-xs text-indigo-400 font-bold";
                } else {
                    modeDesc.innerText = "移動中：ノードをドラッグして配置を調整できます";
                    modeDesc.className = "text-xs text-rose-400 font-bold";
                }
                cy.autolock(false);
                btnEdit.classList.add('hidden');
                btnView.classList.remove('hidden');
                btnToggleDraw.classList.remove('hidden');
                exportModal.style.display = 'none';
            });
            
            cy.on('cxttap', 'edge', function(evt){
                if (!cy.autolock()) evt.target.remove();
            });
        });
    </script>
</body>
</html>
