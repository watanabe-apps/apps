<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>平仮名なぞり・写し書き</title>
    <!-- Klee Oneフォントの読み込み (UDデジタル教科書体が無い環境用のフォールバック) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           共通設定＆誤操作防止＆フォント設定
        ========================================= */
        :root {
            /* UDデジタル教科書体を最優先、次にKlee One */
            --main-font: 'UD Digi Kyokasho N-R', 'UD Digi Kyokasho N-B', 'UD デジタル 教科書体 N-R', 'Klee One', 'Hiragino Maru Gothic ProN', 'Rounded M+ 1c', sans-serif;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            touch-action: none; /* ブラウザ独自スワイプやズーム防止 */
            font-family: var(--main-font);
        }
        body {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            background-color: #fff; color: #333; overflow: hidden;
        }

        .screen { display: none; width: 100%; height: 100%; flex-direction: column; }
        .screen.active { display: flex; }

        .header { display: flex; justify-content: flex-end; padding: 10px 20px; }
        .setting-btn { font-size: 32px; padding: 10px; cursor: pointer; color: #666; border-radius: 50%; transition: background 0.2s;}
        .setting-btn:active { background: #eee; }

        /* =========================================
           ホーム画面 (文字選択)
        ========================================= */
        .tabs { display: flex; justify-content: center; margin-bottom: 10px; }
        .tab-btn { padding: 10px 40px; font-size: 24px; background: #eee; border: 2px solid #ccc; border-radius: 12px 12px 0 0; margin: 0 5px; cursor: pointer; }
        .tab-btn.active { background: #fff; border-bottom-color: #fff; font-weight: bold; }
        
        /* 画面を広く使うためのキーボードレイアウト */
        .keyboard-wrapper {
            display: flex; flex-direction: row; gap: 40px; padding: 10px 20px; 
            overflow-y: auto; justify-content: center; flex-grow: 1; touch-action: pan-y;
        }
        @media (max-width: 768px) {
            .keyboard-wrapper { flex-direction: column; gap: 20px; align-items: center; }
        }
        
        .keyboard { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; align-content: start; }
        .key-btn { padding: 15px; font-size: 36px; border: 2px solid #ddd; border-radius: 12px; background: #fafafa; text-align: center; cursor: pointer; min-width: 70px;}
        .key-btn:active { background: #e0e0e0; }
        .key-btn.empty { visibility: hidden; pointer-events: none; }

        .bottom-bar { padding: 20px; background: #f8f8f8; border-top: 2px solid #ddd; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .selected-text-container { display: flex; align-items: center; gap: 15px; font-size: 36px; height: 50px; flex-wrap: wrap; justify-content: center;}
        .selected-letters { display: flex; gap: 5px; color: #666; font-weight: bold; }
        .del-btn { font-size: 32px; color: #ff5252; padding: 5px 20px; border: 2px solid #ff5252; border-radius: 10px; background: #fff; cursor: pointer;}
        .start-btn { font-size: 32px; padding: 15px 80px; border-radius: 40px; background: #4CAF50; color: white; border: none; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.2); cursor: pointer;}
        .start-btn:disabled { background: #ccc; box-shadow: none; pointer-events: none;}

        /* =========================================
           練習画面
        ========================================= */
        .toolbar { display: flex; justify-content: space-between; padding: 15px 30px; align-items: center; }
        .tools { display: flex; gap: 20px; }
        .tool-btn { font-size: 40px; padding: 15px; border-radius: 15px; border: 3px solid transparent; background: #f0f0f0; opacity: 0.5; cursor: pointer;}
        .tool-btn.active { border-color: #ff5252; opacity: 1; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1);}
        
        .done-btn { font-size: 40px; padding: 15px 40px; border-radius: 40px; border: 3px solid #ccc; background: #fff; color: #ccc; transition: 0.3s; font-weight: bold;}
        .done-btn.active { border-color: #4CAF50; color: #4CAF50; background: #e8f5e9; box-shadow: 0 4px 8px rgba(76, 175, 80, 0.3);}

        .main-letter { font-size: 15vh; text-align: center; font-weight: bold; margin-bottom: 10px; cursor: pointer;}
        
        .canvas-container { flex-grow: 1; display: flex; justify-content: center; align-items: center; padding: 10px 20px 30px; width: 100%; height: 100%; overflow: hidden; }
        
        /* 動的アスペクト比で最大化 (潰れ防止のためフォールバックとminmaxを設定) */
        .grid { 
            display: grid; 
            gap: 5px; 
            grid-template-columns: repeat(var(--cols, 5), minmax(0, 1fr)); 
            grid-template-rows: repeat(var(--rows, 2), minmax(0, 1fr));
            aspect-ratio: var(--cols, 5) / var(--rows, 2); 
            max-width: 100%; 
            max-height: 100%; 
            width: 100%;
        }
        .cell { position: relative; border: 4px solid #333; background: #fff; display: flex; justify-content: center; align-items: center; border-radius: 8px;}
        .cell-text { position: absolute; font-size: calc(80vmin / var(--max-dim, 5)); color: #aaa; pointer-events: none; transition: opacity 0.3s ease; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 4px; touch-action: none; cursor: crosshair;}

        /* =========================================
           設定画面 (モーダル)
        ========================================= */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 100; }
        .modal { background: #fff; padding: 30px; border-radius: 20px; width: 90%; max-width: 600px; display: flex; flex-direction: column; gap: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .setting-row { display: flex; justify-content: space-between; align-items: center; font-size: 24px; font-weight: bold;}
        .stepper { display: flex; align-items: center; gap: 15px; }
        .step-btn { width: 50px; height: 50px; font-size: 30px; border-radius: 25px; border: none; background: #e0e0e0; cursor: pointer;}
        .step-btn:active { background: #ccc; }
        .step-val { font-size: 30px; width: 40px; text-align: center; }
        
        .sample-preview-title { font-size: 20px; text-align: center; margin-top: 10px; color: #666; font-weight: bold;}
        .sample-grid-wrapper { display: flex; justify-content: center; background: #f5f5f5; padding: 15px; border-radius: 12px; border: 2px solid #ddd; max-height: 200px;}
        .sample-grid { display: grid; gap: 2px; height: 100%; max-width: 100%; }
        .sample-cell { border: 2px solid #666; background: #fff; display: flex; justify-content: center; align-items: center; }
        .sample-cell span { font-size: 24px; color: #aaa; }

        .close-modal-btn { font-size: 28px; padding: 15px; margin-top: 15px; background: #333; color: #fff; border-radius: 10px; border: none; font-weight: bold; cursor: pointer;}
        
        /* =========================================
           保存画像一覧 & プレビューモーダル
        ========================================= */
        .saved-images-container { padding: 15px 20px; background: #eaeaea; overflow-x: auto; border-top: 2px solid #ccc; touch-action: pan-x; }
        .saved-images-list { display: flex; gap: 15px; align-items: center; }
        .saved-image-item { height: 120px; width: auto; border: 2px solid #999; background: #fff; border-radius: 6px; object-fit: contain; cursor: pointer; transition: transform 0.2s;}
        .saved-image-item:active { transform: scale(0.95); }
        .saved-images-title { font-size: 16px; font-weight: bold; color: #666; margin-bottom: 5px; }

        #modal-image-view .modal { width: auto; max-width: 95vw; max-height: 95vh; padding: 20px; align-items: center; justify-content: center;}
        #large-image { max-width: 100%; max-height: 65vh; border: 2px solid #ccc; border-radius: 8px;}
        .modal-actions { display: flex; gap: 20px; margin-top: 15px; width: 100%; justify-content: center; flex-wrap: wrap;}
        .del-image-btn { font-size: 24px; padding: 15px 30px; background: #ff5252; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold;}
    </style>
</head>
<body>

    <!-- 1. ホーム画面 -->
    <div id="screen-home" class="screen active">
        <div class="header">
            <div id="setting-trigger" class="setting-btn">⚙️</div>
        </div>
        <div class="tabs">
            <div class="tab-btn active" onclick="switchTab(0)">ひらがな</div>
            <div class="tab-btn" onclick="switchTab(1)">カタカナ</div>
            <div class="tab-btn" onclick="switchTab(2)">数字</div>
        </div>
        
        <!-- 左に清音、右に濁音等を配置 -->
        <div class="keyboard-wrapper">
            <div id="keyboard-left" class="keyboard"></div>
            <div id="keyboard-right" class="keyboard"></div>
        </div>

        <!-- 保存された画像一覧 -->
        <div class="saved-images-container" id="saved-images-container" style="display: none;">
            <div class="saved-images-title">かきおわったもじ</div>
            <div class="saved-images-list" id="saved-images-list"></div>
        </div>

        <div class="bottom-bar">
            <div class="selected-text-container">
                <span>れんしゅう：</span>
                <div id="selected-letters" class="selected-letters"></div>
                <button class="del-btn" onclick="removeLastLetter()">⌫</button>
            </div>
            <button id="start-btn" class="start-btn" disabled onclick="startPractice()">スタート</button>
        </div>
    </div>

    <!-- 2. 練習画面 -->
    <div id="screen-practice" class="screen">
        <div class="toolbar">
            <div class="tools">
                <button id="tool-pen" class="tool-btn active" onclick="setTool('pen')">✏️</button>
                <button id="tool-eraser" class="tool-btn" onclick="setTool('eraser')">🧽</button>
            </div>
            <button id="done-btn" class="done-btn" onclick="nextLetter()">できた</button>
        </div>
        <div id="main-letter" class="main-letter" onclick="speakCurrentLetter()">あ</div>
        <div class="canvas-container" id="canvas-container">
            <div id="canvas-grid" class="grid"></div>
        </div>
    </div>

    <!-- 3. 設定画面 -->
    <div id="modal-setting" class="modal-overlay">
        <div class="modal">
            <h2 style="margin:0; text-align:center;">設定</h2>
            <div class="setting-row">行の数 <div class="stepper"><button class="step-btn" onclick="updateSetting('rows', -1)">-</button><span id="val-rows" class="step-val">2</span><button class="step-btn" onclick="updateSetting('rows', 1)">+</button></div></div>
            <div class="setting-row">列の数 <div class="stepper"><button class="step-btn" onclick="updateSetting('cols', -1)">-</button><span id="val-cols" class="step-val">5</span><button class="step-btn" onclick="updateSetting('cols', 1)">+</button></div></div>
            <div class="setting-row">フェードなぞり <div class="stepper"><button class="step-btn" onclick="updateSetting('fade', -1)">-</button><span id="val-fade" class="step-val">3</span><button class="step-btn" onclick="updateSetting('fade', 1)">+</button></div></div>
            <div class="setting-row">見本なし <div class="stepper"><button class="step-btn" onclick="updateSetting('practice', -1)">-</button><span id="val-practice" class="step-val">2</span><button class="step-btn" onclick="updateSetting('practice', 1)">+</button></div></div>
            
            <div class="sample-preview-title">サンプルビュー</div>
            <div class="sample-grid-wrapper">
                <div id="sample-grid" class="sample-grid"></div>
            </div>

            <button class="close-modal-btn" onclick="closeSetting()">閉じる</button>
        </div>
    </div>

    <!-- 4. 画像プレビュー画面 (モーダル) -->
    <div id="modal-image-view" class="modal-overlay">
        <div class="modal">
            <img id="large-image" src="" alt="保存画像">
            <div class="modal-actions">
                <button class="del-image-btn" onclick="deleteCurrentImage()">🗑️ さくじょ</button>
                <button class="close-modal-btn" style="margin-top:0;" onclick="closeImageView()">閉じる</button>
            </div>
        </div>
    </div>

<script>
/* ===================================================================
   データ定義（左：清音、右：濁音等で分割）
=================================================================== */
const hiraLeft = ["あ","い","う","え","お","か","き","く","け","こ","さ","し","す","せ","そ","た","ち","つ","て","と","な","に","ぬ","ね","の","は","ひ","ふ","へ","ほ","ま","み","む","め","も","や","","ゆ","","よ","ら","り","る","れ","ろ","わ","","を","","ん"];
const hiraRight = ["ゃ","ゅ","ょ","っ","","が","ぎ","ぐ","げ","ご","ざ","じ","ず","ぜ","ぞ","だ","ぢ","づ","で","ど","ば","び","ぶ","べ","ぼ","ぱ","ぴ","ぷ","ぺ","ぽ"];
const kataLeft = ["ア","イ","ウ","エ","オ","カ","キ","ク","ケ","コ","サ","シ","ス","セ","ソ","タ","チ","ツ","テ","ト","ナ","ニ","ヌ","ネ","ノ","ハ","ヒ","フ","ヘ","ホ","マ","ミ","ム","メ","モ","ヤ","","ユ","","ヨ","ラ","リ","ル","レ","ロ","ワ","","ヲ","","ン"];
const kataRight = ["ャ","ュ","ョ","ッ","","ガ","ギ","グ","ゲ","ゴ","ザ","ジ","ズ","ゼ","ゾ","ダ","ヂ","ヅ","デ","ド","バ","ビ","ブ","ベ","ボ","パ","ピ","プ","ペ","ポ"];
const numsLeft = ["1","2","3","4","5","6","7","8","9","0"];

/* ===================================================================
   状態管理・永続化
=================================================================== */
let state = {
    settings: { rows: 2, cols: 5, fade: 3, practice: 2 },
    selectedText: [],
    currentTextIndex: 0,
    currentTool: 'pen',
    cellsStatus: [], // セルの完了状態
    strokes: [],      // Undo用のストローク履歴: strokes[cellIndex] = [{tool, points}]
    savedImages: [], // 書き終えた画像のBase64リスト
    currentImageIndex: -1
};

// localStorageから設定読み込み
const savedSettings = localStorage.getItem('nazoriSettingsPro');
if (savedSettings) state.settings = JSON.parse(savedSettings);

const savedImagesData = localStorage.getItem('nazoriImagesPro');
if (savedImagesData) {
    try {
        state.savedImages = JSON.parse(savedImagesData);
    } catch(e) {
        state.savedImages = [];
    }
}

function saveSettings() {
    localStorage.setItem('nazoriSettingsPro', JSON.stringify(state.settings));
}

function saveImages() {
    try {
        localStorage.setItem('nazoriImagesPro', JSON.stringify(state.savedImages));
    } catch (e) {
        // 容量オーバー(QuotaExceededError)の場合は古いものを消して再試行
        console.warn('LocalStorage limit exceeded, removing oldest image');
        if (state.savedImages.length > 0) {
            state.savedImages.shift();
            saveImages();
        }
    }
}

/* ===================================================================
   トリプルタップ検知 (600ms以内)
=================================================================== */
let tapTimes = [];
document.getElementById('setting-trigger').addEventListener('pointerdown', () => {
    const now = Date.now();
    tapTimes.push(now);
    tapTimes = tapTimes.filter(t => now - t <= 600);
    if (tapTimes.length >= 3) {
        document.getElementById('modal-setting').style.display = 'flex';
        renderSettingValues();
        tapTimes = [];
    }
});

/* ===================================================================
   音声と効果音 (排他制御)
=================================================================== */
const synth = window.speechSynthesis;
const AudioContext = window.AudioContext || window.webkitAudioContext;
let audioCtx;
let isSpeaking = false;

document.body.addEventListener('pointerdown', () => {
    if (!audioCtx) audioCtx = new AudioContext();
}, { once: true });

function speak(text) {
    if (synth.speaking) synth.cancel();
    isSpeaking = true;
    const ut = new SpeechSynthesisUtterance(text);
    ut.lang = 'ja-JP'; ut.pitch = 1.2; ut.rate = 0.8;
    ut.onend = () => { isSpeaking = false; };
    synth.speak(ut);
}

/* ===================================================================
   ホーム画面ロジック
=================================================================== */
function switchTab(index) {
    document.querySelectorAll('.tab-btn').forEach((btn, i) => btn.classList.toggle('active', i === index));
    const leftArr = index === 0 ? hiraLeft : index === 1 ? kataLeft : numsLeft;
    const rightArr = index === 0 ? hiraRight : index === 1 ? kataRight : [];
    
    renderKeyboard('keyboard-left', leftArr);
    renderKeyboard('keyboard-right', rightArr);
}

function renderKeyboard(id, arr) {
    const kb = document.getElementById(id);
    kb.innerHTML = '';
    if (arr.length === 0) {
        kb.style.display = 'none';
        return;
    }
    kb.style.display = 'grid';
    arr.forEach(char => {
        const btn = document.createElement('div');
        btn.className = 'key-btn' + (char === "" ? ' empty' : '');
        btn.textContent = char;
        if (char !== "") {
            btn.onclick = () => {
                state.selectedText.push(char);
                renderSelectedText();
            };
        }
        kb.appendChild(btn);
    });
}

function renderSelectedText() {
    document.getElementById('selected-letters').textContent = state.selectedText.join(' ');
    document.getElementById('start-btn').disabled = state.selectedText.length === 0;
}

function removeLastLetter() {
    state.selectedText.pop();
    renderSelectedText();
}

function startPractice() {
    state.currentTextIndex = 0;
    document.getElementById('screen-home').classList.remove('active');
    document.getElementById('screen-practice').classList.add('active');
    initPracticeScreen();
}

/* ===================================================================
   保存画像一覧・プレビュー ロジック
=================================================================== */
function renderSavedImages() {
    const container = document.getElementById('saved-images-container');
    const list = document.getElementById('saved-images-list');
    list.innerHTML = '';
    
    if (state.savedImages.length === 0) {
        container.style.display = 'none';
        return;
    }
    
    container.style.display = 'block';
    state.savedImages.forEach((imgData, index) => {
        const img = document.createElement('img');
        img.src = imgData;
        img.className = 'saved-image-item';
        img.onclick = () => openImageView(index);
        list.appendChild(img);
    });
}

function openImageView(index) {
    state.currentImageIndex = index;
    document.getElementById('large-image').src = state.savedImages[index];
    document.getElementById('modal-image-view').style.display = 'flex';
}

function closeImageView() {
    document.getElementById('modal-image-view').style.display = 'none';
    state.currentImageIndex = -1;
}

function deleteCurrentImage() {
    if (state.currentImageIndex >= 0) {
        state.savedImages.splice(state.currentImageIndex, 1);
        saveImages();
        renderSavedImages();
        closeImageView();
    }
}

/* ===================================================================
   設定画面ロジック
=================================================================== */
function renderSettingValues() {
    document.getElementById('val-rows').textContent = state.settings.rows;
    document.getElementById('val-cols').textContent = state.settings.cols;
    document.getElementById('val-fade').textContent = state.settings.fade;
    document.getElementById('val-practice').textContent = state.settings.practice;
    renderSampleGrid();
}

function updateSetting(key, delta) {
    let val = state.settings[key] + delta;
    if (key === 'rows' && (val < 1 || val > 5)) return;
    if (key === 'cols' && (val < 1 || val > 10)) return;
    
    const total = (key === 'rows' ? val : state.settings.rows) * (key === 'cols' ? val : state.settings.cols);
    
    if (key === 'fade' || key === 'practice') {
        if (val < 0) return;
        if (val > total) val = total;
    }

    state.settings[key] = val;
    
    // 整合性調整
    if (state.settings.fade + state.settings.practice > total) {
        const excess = (state.settings.fade + state.settings.practice) - total;
        if (state.settings.practice >= excess) {
            state.settings.practice -= excess;
        } else {
            const rest = excess - state.settings.practice;
            state.settings.practice = 0;
            state.settings.fade = Math.max(0, state.settings.fade - rest);
        }
    }
    
    saveSettings();
    renderSettingValues();
}

function renderSampleGrid() {
    const grid = document.getElementById('sample-grid');
    const { rows, cols, fade, practice } = state.settings;
    const total = rows * cols;
    
    grid.innerHTML = '';
    grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
    grid.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
    grid.style.aspectRatio = `${cols} / ${rows}`;

    for (let i = 0; i < total; i++) {
        const isPractice = i >= total - practice;
        const isFade = (total - fade - practice <= i) && (i < total - practice);
        
        const cell = document.createElement('div');
        cell.className = 'sample-cell';
        const txt = document.createElement('span');
        txt.textContent = 'あ';
        txt.style.opacity = isPractice ? '0' : (isFade ? '0.4' : '1');
        
        cell.appendChild(txt);
        grid.appendChild(cell);
    }
}

function closeSetting() {
    document.getElementById('modal-setting').style.display = 'none';
    if (document.getElementById('screen-practice').classList.contains('active')) {
        initPracticeScreen(); // 設定反映のため再描画
    }
}

/* ===================================================================
   練習画面・キャンバスロジック
=================================================================== */
function setTool(tool) {
    state.currentTool = tool;
    document.getElementById('tool-pen').classList.toggle('active', tool === 'pen');
    document.getElementById('tool-eraser').classList.toggle('active', tool === 'eraser');
}

function speakCurrentLetter() {
    speak(state.selectedText[state.currentTextIndex]);
}

function initPracticeScreen() {
    const letter = state.selectedText[state.currentTextIndex];
    document.getElementById('main-letter').textContent = letter;
    speak(letter); 

    const grid = document.getElementById('canvas-grid');
    grid.innerHTML = '';
    
    const { rows, cols, fade, practice } = state.settings;
    const total = rows * cols;
    
    // JS側でも完全にスタイルを適用することで、ブラウザごとの解釈エラー(潰れ)を防止
    grid.style.setProperty('--cols', cols);
    grid.style.setProperty('--rows', rows);
    grid.style.setProperty('--max-dim', Math.max(cols, rows));
    grid.style.gridTemplateColumns = `repeat(${cols}, minmax(0, 1fr))`;
    grid.style.gridTemplateRows = `repeat(${rows}, minmax(0, 1fr))`;
    grid.style.aspectRatio = `${cols} / ${rows}`;

    state.cellsStatus = Array(total).fill(false);
    state.strokes = Array.from({length: total}, () => []); // Undo用配列の初期化
    checkDone();

    for (let i = 0; i < total; i++) {
        const isPractice = i >= total - practice;
        const isFade = (total - fade - practice <= i) && (i < total - practice);

        const cell = document.createElement('div');
        cell.className = 'cell';
        
        const textSpan = document.createElement('span');
        textSpan.className = 'cell-text';
        textSpan.textContent = letter;
        textSpan.style.opacity = isPractice ? "0" : (isFade ? "0.4" : "1");
        textSpan.id = `cell-text-${i}`;

        const canvas = document.createElement('canvas');
        setupCanvas(canvas, i, isFade);

        cell.appendChild(textSpan);
        cell.appendChild(canvas);
        grid.appendChild(cell);
    }
}

// レスポンシブ対応 (デバウンス)
let resizeTimer;
window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
        if (document.getElementById('screen-practice').classList.contains('active')) {
            // サイズが変わったら、描画履歴を保持したままキャンバスサイズを再設定
            const canvases = document.querySelectorAll('canvas');
            canvases.forEach((canvas, index) => {
                setCanvasSize(canvas);
                redrawCanvas(canvas, index);
            });
        }
    }, 200);
});

function setCanvasSize(canvas) {
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width * window.devicePixelRatio;
    canvas.height = rect.height * window.devicePixelRatio;
    const ctx = canvas.getContext('2d');
    ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
}

function applyToolSettings(ctx, tool) {
    if (tool === 'pen') {
        ctx.globalCompositeOperation = 'source-over';
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 15;
    } else {
        ctx.globalCompositeOperation = 'destination-out';
        ctx.lineWidth = 40;
    }
}

function redrawCanvas(canvas, index) {
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height); // 一旦全クリア
    
    state.strokes[index].forEach(stroke => {
        applyToolSettings(ctx, stroke.tool);
        if (stroke.points.length === 0) return;
        ctx.beginPath();
        ctx.moveTo(stroke.points[0].x, stroke.points[0].y);
        for (let i = 1; i < stroke.points.length; i++) {
            ctx.lineTo(stroke.points[i].x, stroke.points[i].y);
        }
        ctx.stroke();
    });
}

function setupCanvas(canvas, index, isFade) {
    setTimeout(() => setCanvasSize(canvas), 0);
    const ctx = canvas.getContext('2d');
    
    let isDrawing = false;
    let hasMoved = false;
    let startX = 0, startY = 0;
    let currentStroke = null;

    const getPos = (e) => {
        const rect = canvas.getBoundingClientRect();
        return { x: e.clientX - rect.left, y: e.clientY - rect.top };
    };

    canvas.addEventListener('pointerdown', (e) => {
        isDrawing = true;
        hasMoved = false;
        canvas.setPointerCapture(e.pointerId);

        const pos = getPos(e);
        startX = pos.x; startY = pos.y;
        
        currentStroke = { tool: state.currentTool, points: [{x: pos.x, y: pos.y}] };

        applyToolSettings(ctx, state.currentTool);
        ctx.beginPath();
        ctx.moveTo(pos.x, pos.y);

        // フェードなぞりの文字消去 (transition 0.3s)
        if (isFade) document.getElementById(`cell-text-${index}`).style.opacity = '0';
    });

    canvas.addEventListener('pointermove', (e) => {
        if (!isDrawing) return;
        const pos = getPos(e);
        
        // 移動判定（タップとドラッグの識別：5px以上の移動でドラッグ判定）
        if (!hasMoved && Math.hypot(pos.x - startX, pos.y - startY) > 5) {
            hasMoved = true;
        }

        currentStroke.points.push({x: pos.x, y: pos.y});
        ctx.lineTo(pos.x, pos.y);
        ctx.stroke();
    });

    const finishDrawing = (e) => {
        if (!isDrawing) return;
        isDrawing = false;
        canvas.releasePointerCapture(e.pointerId);

        if (hasMoved) {
            // ドラッグ：履歴にストロークを追加
            state.strokes[index].push(currentStroke);
        } else if (e.type === 'pointerup') {
            // タップ（かつ指を離した）：1画（前回のストローク）を消す Undo処理
            if (state.strokes[index].length > 0) {
                state.strokes[index].pop(); 
            }
            redrawCanvas(canvas, index);
        } else {
             // pointercancel等の場合は何も残さない
             redrawCanvas(canvas, index);
        }

        // 完了状態の更新 (ペンで書かれたストロークが1つでもあれば完了)
        state.cellsStatus[index] = state.strokes[index].some(s => s.tool === 'pen');
        checkDone();

        // フェードなぞりの文字復旧
        if (isFade) document.getElementById(`cell-text-${index}`).style.opacity = '0.4';
    };

    canvas.addEventListener('pointerup', finishDrawing);
    canvas.addEventListener('pointercancel', finishDrawing);
}

function checkDone() {
    const isAllDrawn = state.cellsStatus.every(s => s === true);
    const btn = document.getElementById('done-btn');
    if (isAllDrawn && state.cellsStatus.length > 0) {
        btn.classList.add('active');
    } else {
        btn.classList.remove('active');
    }
}

function captureGrid() {
    const grid = document.getElementById('canvas-grid');
    const rect = grid.getBoundingClientRect();
    
    const canvas = document.createElement('canvas');
    const scale = 2; // 高解像度でキャプチャ
    canvas.width = rect.width * scale;
    canvas.height = rect.height * scale;
    const ctx = canvas.getContext('2d');
    ctx.scale(scale, scale);
    
    // 全体の背景
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, rect.width, rect.height);
    
    const cells = grid.querySelectorAll('.cell');
    cells.forEach((cell) => {
        const cellRect = cell.getBoundingClientRect();
        const x = cellRect.left - rect.left;
        const y = cellRect.top - rect.top;
        const w = cellRect.width;
        const h = cellRect.height;
        
        // セルの背景
        ctx.fillStyle = '#fff';
        ctx.fillRect(x, y, w, h);
        
        // 枠線
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 4;
        ctx.strokeRect(x, y, w, h);
        
        // 見本文字
        const textSpan = cell.querySelector('.cell-text');
        const opacity = parseFloat(textSpan.style.opacity || 1);
        if (opacity > 0) {
             ctx.fillStyle = `rgba(170, 170, 170, ${opacity})`;
             const fontSize = window.getComputedStyle(textSpan).fontSize;
             const fontFamily = window.getComputedStyle(textSpan).fontFamily;
             ctx.font = `${fontSize} ${fontFamily}`;
             ctx.textAlign = 'center';
             ctx.textBaseline = 'middle';
             // 垂直位置を少し補正
             ctx.fillText(textSpan.textContent, x + w/2, y + h/2 + (parseFloat(fontSize) * 0.05)); 
        }
        
        // なぞり書き(Canvas)
        const cellCanvas = cell.querySelector('canvas');
        if (cellCanvas) {
            ctx.drawImage(cellCanvas, x, y, w, h);
        }
    });
    
    // 容量節約のためJPEGで保存
    return canvas.toDataURL('image/jpeg', 0.8);
}

function nextLetter() {
    const isAllDrawn = state.cellsStatus.every(s => s === true);
    if (!isAllDrawn) return;

    // キャプチャして保存
    const imgData = captureGrid();
    state.savedImages.push(imgData);
    saveImages();

    state.currentTextIndex++;
    if (state.currentTextIndex < state.selectedText.length) {
        initPracticeScreen();
    } else {
        state.selectedText = [];
        renderSelectedText();
        renderSavedImages();
        document.getElementById('screen-practice').classList.remove('active');
        document.getElementById('screen-home').classList.add('active');
        switchTab(0);
    }
}

// 初期化実行
switchTab(0);
renderSavedImages();
document.addEventListener('contextmenu', e => e.preventDefault());
</script>
